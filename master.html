<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirafix - Home</title>
    <link rel="stylesheet" href="style.css?v=2">

<style>
    /* شاشة التحميل - زي ما هي */
    #loadingScreen { position: fixed; inset: 0; background: #fff; z-index: 9999; transition: opacity 0.6s; }
    .welcome-box-final { position: fixed; top: 10px; left: 10px; font-size: 28px; font-weight: bold; color: #fff; background: #374151; padding: 15px 20px; border-radius: 10px; }
    .loading-area-final { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 260px; }
    .rolling-box-final { position: absolute; top: -70px; left: 0; width: 60px; height: 60px; background: #374151; border-radius: 10px; animation: rollAcross 3s infinite ease-in-out; }
    @keyframes rollAcross { 0% { left: 0; transform: rotate(0deg); } 50% { left: calc(100% - 60px); transform: rotate(360deg); } 100% { left: 0; transform: rotate(720deg); } }

    .post { padding: 0 !important; margin-bottom: 12px; border-radius: 10px; overflow: hidden; background: white; border: 1px solid #e5e7eb; }
    .post-header { display: flex; gap: 8px; padding: 8px 10px; align-items: center; }
    .post-text { padding: 0 10px 8px 10px; margin: 0; font-size: 14.5px; line-height: 1.4; }
    .post img, .post video { width: 100%; display: block; border-radius: 0; margin: 0; }
    .post-stats { display: flex; justify-content: space-between; font-size: 12px; color: #65676b; padding: 5px 10px; border-bottom: 1px solid #f3f4f6; }
    .post-actions { display: flex; justify-content: space-around; padding: 2px 0; }
    .action-btn { background: none; border: none; color: #65676b; font-weight: bold; cursor: pointer; padding: 6px; flex: 1; font-size: 13px; }
    .action-btn.liked { color: #2563eb; }
    .comments-section { display: none; background: #f0f2f5; padding: 8px 10px; }
</style>
</head>

<body>

<div id="loadingScreen">
    <div class="welcome-box-final">
        Welcome <span id="user-name-display">...</span>
    </div>
</div>

<section class="section">
    <div id="postsContainer"></div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
getFirestore, collection, addDoc, query, orderBy, onSnapshot,
serverTimestamp, doc, getDoc, updateDoc, arrayUnion, arrayRemove, increment
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSyCMH9WZIHPYYtnAhCUjRWyq9alIHPX872E",
authDomain: "kirafix-a0ed2.firebaseapp.com",
projectId: "kirafix-a0ed2"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* ================= FIX: COMMENTS ================= */
window.toggleComments = (postId) => {
    const section = document.getElementById(`comments-${postId}`);
    const isOpen = section.style.display === "block";

    if (!isOpen) {
        section.style.display = "block";
        if (!section.dataset.loaded) {
            loadCommentsRealtime(postId);
            section.dataset.loaded = "true";
        }
    } else {
        section.style.display = "none";
    }
};

/* ================= FIX: LIKE ================= */
window.toggleLike = async (postId) => {
    if (!auth.currentUser) return;

    const ref = doc(db, "posts", postId);
    const snap = await getDoc(ref);
    const data = snap.data();

    const likes = data.likes || [];
    const uid = auth.currentUser.uid;

    if (likes.includes(uid)) {
        await updateDoc(ref, { likes: arrayRemove(uid) });
    } else {
        await updateDoc(ref, { likes: arrayUnion(uid) });
    }
};

/* ================= FIX: VIEW OBSERVER ================= */
const viewObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (!entry.isIntersecting) return;

        const postId = entry.target.getAttribute('data-id');
        const viewed = JSON.parse(entry.target.getAttribute('data-views') || "[]");

        if (auth.currentUser && !viewed.includes(auth.currentUser.uid)) {
            updateDoc(doc(db,"posts",postId), {
                views: arrayUnion(auth.currentUser.uid)
            });

            viewed.push(auth.currentUser.uid);
            entry.target.setAttribute('data-views', JSON.stringify(viewed));

            viewObserver.unobserve(entry.target);
        }
    });
}, { threshold: 0.85 });

/* ================= POSTS ================= */
onSnapshot(query(collection(db,"posts"), orderBy("createdAt","desc")), (snap) => {
    const container = document.getElementById("postsContainer");

    snap.docChanges().forEach(change => {
        const post = change.doc.data();
        const id = change.doc.id;

        const likes = post.likes || [];
        const views = post.views || [];
        const uid = auth.currentUser?.uid;

        const hasLiked = likes.includes(uid);

        if (change.type === "added") {
            const html = `
            <div class="post" id="post-${id}" data-id="${id}" data-views='${JSON.stringify(views)}'>
                <div style="padding:15px;">
                    <div class="post-header">
                        <img src="${post.userImage}" style="width:45px;height:45px;border-radius:50%;">
                        <div>${post.userName}</div>
                    </div>

                    <div class="post-text">${post.text || ""}</div>

                    ${post.image ? `<img src="${post.image}">` : ""}
                    ${post.video ? `<video src="${post.video}" controls></video>` : ""}

                    <div class="post-stats" id="stats-${id}">
                        <span>👍 ${likes.length}</span>
                        <span>${views.length} views • ${post.commentsCount || 0} comments</span>
                    </div>

                    <div class="post-actions">
                        <button class="action-btn ${hasLiked?'liked':''}" 
                        onclick="toggleLike('${id}')">
                            ❤️ Like
                        </button>

                        <button class="action-btn" onclick="toggleComments('${id}')">
                            💬 Comment
                        </button>
                    </div>
                </div>

                <div class="comments-section" id="comments-${id}">
                    <div id="list-${id}"></div>
                    <input id="input-${id}" placeholder="write comment..."
                    onkeypress="if(event.key==='Enter') sendComment('${id}')">
                </div>
            </div>
            `;

            container.insertAdjacentHTML("afterbegin", html);
            viewObserver.observe(document.getElementById(`post-${id}`));
        }

        if (change.type === "modified") {
            const stats = document.getElementById(`stats-${id}`);
            if (stats) {
                stats.innerHTML = `
                <span>👍 ${likes.length}</span>
                <span>${views.length} views • ${post.commentsCount || 0} comments</span>
                `;
            }
        }

        if (change.type === "removed") {
            document.getElementById(`post-${id}`)?.remove();
        }
    });
});

</script>

</body>
</html>
