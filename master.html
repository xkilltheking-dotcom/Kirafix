<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirafix - Home</title>
    <link rel="stylesheet" href="style.css?v=2">

<style>
/* ====== LOADING ====== */
#loadingScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #fff;
    top: 0;
    left: 0;
    z-index: 9999;
    transition: opacity 0.6s ease;
}

/* باقي CSS زي ما هو بدون تغيير */
</style>
</head>

<body>

<div id="loadingScreen">
    <div class="welcome-box-final">
        Welcome <span id="user-name-display">...</span>
    </div>
</div>

<section class="section">
    <div id="postsContainer"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import {
getFirestore,
collection, addDoc, query, orderBy, onSnapshot,
serverTimestamp, doc, getDoc, updateDoc,
arrayUnion, arrayRemove, increment
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* ===== Firebase ===== */
const app = initializeApp({
apiKey: "AIzaSyCMH9WZIHPYYtnAhCUjRWy9alIHPX872E",
authDomain: "kirafix-a0ed2.firebaseapp.com",
projectId: "kirafix-a0ed2"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUserData = null;

/* ===== SAFE LOADING FIX ===== */
function hideLoader() {
    const loader = document.getElementById("loadingScreen");
    if (!loader) return;

    loader.style.opacity = "0";
    setTimeout(() => loader.style.display = "none", 600);
}

/* ===== AUTH ===== */
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "index.html";
        return;
    }

    try {
        const userDoc = await getDoc(doc(db, "users", user.uid));

        if (userDoc.exists()) {
            currentUserData = userDoc.data();
            document.getElementById("user-name-display").textContent =
                currentUserData?.name || user.email.split("@")[0];
        } else {
            document.getElementById("user-name-display").textContent =
                user.email.split("@")[0];
        }

    } catch (e) {
        console.error("User load error:", e);
    }

    /* مهم: تأخير بسيط عشان Firebase يكمّل */
    setTimeout(hideLoader, 1200);
});

/* ===== LIKE FIX ===== */
window.toggleLike = async (postId, hasLiked) => {
    if (!auth.currentUser) return;

    const ref = doc(db, "posts", postId);

    try {
        if (hasLiked) {
            await updateDoc(ref, {
                likes: arrayRemove(auth.currentUser.uid)
            });
        } else {
            await updateDoc(ref, {
                likes: arrayUnion(auth.currentUser.uid)
            });
        }
    } catch (e) {
        console.error("Like error:", e);
    }
};

/* ===== COMMENTS TOGGLE SAFE ===== */
window.toggleComments = (postId) => {
    const section = document.getElementById(`comments-${postId}`);
    if (!section) return;

    const isOpen = section.style.display === "block";
    section.style.display = isOpen ? "none" : "block";
};

/* ===== SEND COMMENT SAFE ===== */
window.sendComment = async (postId) => {
    const input = document.getElementById(`input-${postId}`);
    if (!input || !auth.currentUser) return;

    const text = input.value.trim();
    if (!text) return;

    try {
        await addDoc(collection(db, "posts", postId, "comments"), {
            text,
            uid: auth.currentUser.uid,
            userName: currentUserData?.name || "User",
            userImage: currentUserData?.image || "",
            createdAt: serverTimestamp()
        });

        await updateDoc(doc(db, "posts", postId), {
            commentsCount: increment(1)
        });

        input.value = "";
    } catch (e) {
        console.error(e);
    }
};

/* ===== POSTS STREAM ===== */
onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snap) => {
    const container = document.getElementById("postsContainer");
    if (!container) return;

    container.innerHTML = "";

    snap.forEach((d) => {
        const post = d.data();
        const id = d.id;

        const likes = post.likes || [];
        const views = post.views || [];
        const uid = auth.currentUser?.uid;

        const hasLiked = uid ? likes.includes(uid) : false;

        const postHTML = `
        <div class="post" id="post-${id}" data-id="${id}">
            <div style="padding:15px;">

                <div style="display:flex; gap:10px;">
                    <img src="${post.userImage}" style="width:45px;height:45px;border-radius:50%;">
                    <div>${post.userName}</div>
                </div>

                <div>${post.text || ""}</div>

                ${post.image ? `<img src="${post.image}" style="width:100%;">` : ""}
                ${post.video ? `<video src="${post.video}" controls style="width:100%"></video>` : ""}

                <div>
                    👍 ${likes.length}
                    👁 ${views.length}
                </div>

                <button onclick="toggleLike('${id}', ${hasLiked})">
                    ${hasLiked ? "❤️ Liked" : "🤍 Like"}
                </button>

                <button onclick="toggleComments('${id}')">
                    💬 Comments
                </button>

            </div>

            <div id="comments-${id}" style="display:none;">
                <div id="list-${id}"></div>

                <input id="input-${id}" placeholder="write comment"
                onkeypress="if(event.key==='Enter'){sendComment('${id}')}" />
            </div>
        </div>`;

        container.insertAdjacentHTML("beforeend", postHTML);
    });
});

</script>

</body>
</html>
