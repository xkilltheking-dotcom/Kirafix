<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon_fixed.png?v=2.0">
    <link rel="apple-touch-icon" href="./favicon_fixed.png?v=2.0">
    <title>Kirafix - Store 🎡</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #ffd700;
            --dark-bg: #111827;
        }

        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            transition: 0.3s;
        }

        body.dark-mode { background-color: var(--dark-bg); color: white; }

        .container { max-width: 600px; margin: 20px auto; padding: 20px; }

        .home-btn {
            display: inline-block; margin-bottom: 15px; padding: 10px 20px;
            background: #fff; color: #111; text-decoration: none; border-radius: 12px;
            font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s;
        }
        body.dark-mode .home-btn { background: #1f2937; color: white; }
        .home-btn:hover { transform: scale(1.05); background: var(--gold); color: black; }

        .store-card, .inventory-section {
            background: white; border-radius: 20px; padding: 30px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid var(--gold);
            margin-bottom: 20px; position: relative;
        }
        body.dark-mode .store-card, body.dark-mode .inventory-section { background: #1f2937; border-color: #374151; }

        .balance-box {
            background: var(--gold); color: #000; padding: 10px 20px;
            border-radius: 50px; display: inline-flex; align-items: center; gap: 10px;
            font-weight: bold; margin-bottom: 20px;
        }

        .daily-btn {
            background: #10b981; color: white; border: none; padding: 8px 15px;
            border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 15px;
            display: block; width: 100%; transition: 0.3s;
        }
        .daily-btn:disabled { background: #6b7280; cursor: not-allowed; }

        /* Lucky Wheel */
        .wheel-container { position: relative; width: 250px; height: 250px; margin: 20px auto; }
        #wheel-canvas {
            width: 100%; height: 100%; border-radius: 50%; border: 5px solid #374151;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }
        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 30px; background: red; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10;
        }

        .spin-btn {
            background: #2563eb; color: white; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .spin-btn:disabled { background: #9ca3af; cursor: not-allowed; }

        /* الألقاب */
        .badge-market { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin: 20px 0; }
        .badge-buy-card {
            background: #f9fafb; padding: 15px; border-radius: 15px; border: 1px solid #e5e7eb;
            cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; min-height: 160px;
        }
        body.dark-mode .badge-buy-card { background: #111827; border-color: #374151; }
        .badge-buy-card:hover { border-color: var(--gold); transform: translateY(-3px); }
        .badge-benefit { font-size: 10px; color: #6b7280; margin-top: 5px; line-height: 1.2; }

        /* Inventory */
        .color-grid, .badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 15px; margin-top: 15px; justify-items: center; }
        .item-box { width: 50px; height: 50px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; background: #eee; display: flex; align-items: center; justify-content: center; position: relative; transition: 0.2s; }
        body.dark-mode .item-box { background: #111827; }
        .item-box.active { border-color: var(--gold); transform: scale(1.1); }
        .item-box.active::after { content: '✓'; position: absolute; bottom: -5px; right: -5px; background: var(--gold); color: black; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .badge-admin { background: #fee2e2 !important; color: #ef4444 !important; border: 1px solid #fecaca !important; font-weight: bold !important; }
        .badge-editor { background: #f3e8ff !important; color: #9333ea !important; border: 1px solid #e9d5ff !important; font-weight: bold !important; }

        .item-box.rainbow { 
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff) !important; 
            background-size: 200% 200% !important; animation: rainbowBG 2s linear infinite !important; 
        }
        @keyframes rainbowBG { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }

        /* Pricing */
        .coins-pricing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .price-card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 15px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        body.dark-mode .price-card { background: #111827; border-color: #374151; }
        .price-card:hover { transform: translateY(-5px); border-color: var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .popular-badge { position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; font-size: 9px; padding: 2px 10px; border-radius: 0 0 10px 10px; font-weight: bold; }
        .royal-pack { border: 2px solid #8b5cf6; background: linear-gradient(to bottom, #ffffff, #f5f3ff); }
        body.dark-mode .royal-pack { background: linear-gradient(to bottom, #111827, #1e1b4b); }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="home-btn">🏠 العودة للرئيسية</a>

    <div class="store-card">
        <button id="dailyBtn" class="daily-btn">🎁 استلام الهدية اليومية</button>
        <h2>🎡 Kirafix Lucky Wheel</h2>
        <div class="balance-box">
            <span>رصيدك:</span>
            <span id="user-coins">0</span>
            <span>🪙</span>
        </div>
        <p>تكلفة اللفة: 100 كوين</p>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel-canvas" width="500" height="500"></canvas>
        </div>
        <button id="spinBtn" class="spin-btn">إبدأ اللف الآن!</button>
    </div>

    <div class="store-card">
        <h3>🎖️ متجر الأوسمة والتوثيق</h3>
        <div class="badge-market" id="badge-market"></div>
    </div>

    <div class="inventory-section">
        <h3>🎒 حقيبتك (Inventory)</h3>
        <div id="color-grid" class="color-grid"></div>
        <div id="badge-grid" class="badge-grid"></div>
    </div>

    <div class="store-card">
        <h3>💰 شحن رصيد الكوينز</h3>
        <div class="coins-pricing-grid">
            <div class="price-card" onclick="initiatePayment(100, 0.99)">
                <div style="font-size:30px">🪙</div>
                <div style="font-weight:bold">100 كوين</div>
                <div style="color:#10b981">$0.99</div>
            </div>
            <div class="price-card popular" onclick="initiatePayment(700, 4.99)">
                <div class="popular-badge">الأكثر طلباً</div>
                <div style="font-size:30px">🪙</div>
                <div style="font-weight:bold">700 كوين</div>
                <div style="color:#10b981">$4.99</div>
            </div>
            <div class="price-card royal-pack" onclick="initiatePayment(10000, 49.99)">
                <div style="font-size:30px">🌌</div>
                <div style="font-weight:bold">10000 كوين</div>
                <div style="color:#10b981">$49.99</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCMH9WZIHPYYtnAhCUjRWyq9alIHPX872E",
        authDomain: "kirafix-a0ed2.firebaseapp.com",
        projectId: "kirafix-a0ed2",
        storageBucket: "kirafix-a0ed2.firebasestorage.app",
        messagingSenderId: "1038377831293",
        appId: "1:103837103837:web:c4763c6157addb25a1da14"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const spinSound = new Audio('https://assets.mixkit.co/active_storage/sfx/1471/1471-preview.mp3');
    const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

    const colors = [
        { name: 'أحمر', code: 'linear-gradient(135deg, #ff4d4d, #cc0000)', chance: 24.0 },
        { name: 'أخضر', code: 'linear-gradient(135deg, #4dff4d, #00cc00)', chance: 24.0 },
        { name: 'أزرق', code: 'linear-gradient(135deg, #4d4dff, #0000cc)', chance: 24.0 },
        { name: 'جولد', code: 'linear-gradient(135deg, #ffd700, #b8860b)', chance: 1.0 },
        { name: 'دموي', code: 'linear-gradient(135deg, #8a0303, #4a0000)', chance: 1.0 },
        { name: 'رينبو', code: 'RAINBOW_SPECIAL', chance: 0.1 }
    ];

    const availableBadges = [
        { id: 'sticker', name: 'المثبت', icon: '📌', price: 3000, benefit: 'تثبيت منشورك في المقدمة.' },
        { id: 'glow', name: 'المتوهج', icon: '✨', price: 7500, benefit: 'إطار مضيء وتأثير بصري.' },
        { id: 'radar', name: 'الرادار', icon: '📡', price: 18000, benefit: 'ظهور منشورك كإعلان إجباري.' },
        { id: 'infinity', name: 'اللانهائي', icon: '🚀', price: 35000, benefit: 'تكرار تلقائي لمنشورك.' }
    ];

    const canvas = document.getElementById("wheel-canvas");
    const ctx = canvas.getContext("2d");
    function drawWheel() {
        const arc = (2 * Math.PI) / colors.length;
        colors.forEach((color, i) => {
            ctx.beginPath();
            ctx.fillStyle = (color.code === 'RAINBOW_SPECIAL') ? '#ff00ff' : color.code.match(/#[a-f0-9]{6}/i)[0];
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, i * arc, (i + 1) * arc);
            ctx.fill();
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(i * arc + arc / 2);
            ctx.fillStyle = "#fff"; ctx.font = "bold 18px Arial";
            ctx.fillText(color.name, 120, 10);
            ctx.restore();
        });
    }
    drawWheel();

    onAuthStateChanged(auth, (user) => {
        if (!user) return;
        onSnapshot(doc(db, "users", user.uid), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                const coins = data.coins || 0;
                document.getElementById("user-coins").textContent = coins >= 1000000 ? (coins/1000000).toFixed(1) + 'M' : coins;
                renderInv(data.inventory || [], data.activeColor, "color-grid", true);
                renderBadgeInv(data.inventoryBadges || [], data.activeBadge);
                checkDaily(data.lastDaily);
            }
        });
    });

    async function checkDaily(lastDaily) {
        const btn = document.getElementById("dailyBtn");
        if (!lastDaily) return;
        if (lastDaily.toDate().toLocaleDateString() === new Date().toLocaleDateString()) {
            btn.disabled = true; btn.textContent = "✅ تم استلام هدية اليوم";
        }
    }

    document.getElementById("dailyBtn").onclick = async () => {
        await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: increment(50), lastDaily: serverTimestamp() });
        confetti({ particleCount: 100 });
    };

    function renderInv(items, active, gridId, isColor) {
        const grid = document.getElementById(gridId); grid.innerHTML = "";
        ['linear-gradient(135deg, #374151, #111827)', ...new Set(items)].forEach(item => {
            const d = document.createElement("div");
            d.className = `item-box ${active === item ? 'active' : ''} ${item === 'RAINBOW_SPECIAL' ? 'rainbow' : ''}`;
            if(isColor && item !== 'RAINBOW_SPECIAL') d.style.background = item;
            d.onclick = () => updateDoc(doc(db, "users", auth.currentUser.uid), { activeColor: item });
            grid.appendChild(d);
        });
    }

    function renderBadgeInv(badges, active) {
        const grid = document.getElementById("badge-grid"); grid.innerHTML = "";
        (badges || []).forEach(id => {
            const d = document.createElement("div");
            let specialClass = id === 'admin' ? "badge-admin" : (id === 'editor' ? "badge-editor" : "");
            d.className = `item-box ${active === id ? 'active' : ''} ${specialClass}`;
            if (id === 'admin') d.innerHTML = "<small>ADM</small>";
            else if (id === 'editor') d.innerHTML = "<small>EDI</small>";
            else {
                const b = availableBadges.find(x => x.id === id);
                d.innerHTML = b ? b.icon : "🎖️";
            }
            d.onclick = () => updateDoc(doc(db, "users", auth.currentUser.uid), { activeBadge: id });
            grid.appendChild(d);
        });
    }

    document.getElementById("badge-market").innerHTML = availableBadges.map(b => `
        <div class="badge-buy-card" onclick="window.buyBadge('${b.id}', ${b.price})">
            <div><div style="font-size:25px">${b.icon}</div><b>${b.name}</b><div class="badge-benefit">${b.benefit}</div></div>
            <div style="color:#10b981; font-weight:bold;">${b.price} 🪙</div>
        </div>
    `).join('');

    let rotation = 0;
    document.getElementById("spinBtn").onclick = async () => {
        const userRef = doc(db, "users", auth.currentUser.uid);
        const snap = await getDoc(userRef);
        if ((snap.data().coins || 0) < 100) return alert("رصيدك لا يكفي!");
        document.getElementById("spinBtn").disabled = true;
        spinSound.play();
        await updateDoc(userRef, { coins: increment(-100) });
        let winningIndex = Math.floor(Math.random() * colors.length);
        rotation += (360 * 5) + (360 - (winningIndex * (360/colors.length)) - (180/colors.length));
        canvas.style.transform = `rotate(${rotation}deg)`;
        setTimeout(async () => {
            winSound.play();
            await updateDoc(userRef, { inventory: arrayUnion(colors[winningIndex].code) });
            confetti({ particleCount: 150 });
            alert(`مبروك! حصلت على لون ${colors[winningIndex].name}`);
            document.getElementById("spinBtn").disabled = false;
        }, 4000);
    };

    window.buyBadge = async (id, price) => {
        const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
        if ((snap.data().inventoryBadges || []).includes(id)) return alert("تمتلكه بالفعل!");
        if (snap.data().coins < price) return alert("رصيدك لا يكفي!");
        if(confirm("شراء؟")) await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: increment(-price), inventoryBadges: arrayUnion(id) });
    };

    window.initiatePayment = (amount, price) => alert(`تحويل لصفحة دفع آمن لشراء ${amount} كوين...`);
</script>
</body>
</html>
