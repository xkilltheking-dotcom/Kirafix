<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirafix - Store 🎡</title>
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        :root {
            --gold: #ffd700;
            --dark-bg: #111827;
        }

        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        body.dark-mode {
            background-color: var(--dark-bg);
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }

        /* تصميم المتجر */
        .store-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid var(--gold);
        }
        body.dark-mode .store-card { background: #1f2937; border-color: #374151; }

        .balance-box {
            background: var(--gold);
            color: #000;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* العجلة */
        .wheel-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 20px auto;
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #374151;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: red;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .spin-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .spin-btn:disabled { background: #9ca3af; cursor: not-allowed; }

        /* الـ Inventory */
        .inventory-section {
            margin-top: 40px;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        body.dark-mode .inventory-section { background: #1f2937; }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .color-item {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
            position: relative;
        }
        .color-item.active { border-color: var(--gold); transform: scale(1.1); }
        .color-item.active::after {
            content: '✓';
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--gold);
            color: black;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="store-card">
        <h2>🎡 Kirafix Lucky Wheel</h2>
        <div class="balance-box">
            <span>رصيدك:</span>
            <span id="user-coins">0</span>
            <span>🪙</span>
        </div>
        
        <p>تكلفة اللفة الواحدة 100 كوين</p>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel-canvas" width="500" height="500"></canvas>
        </div>

        <button id="spinBtn" class="spin-btn">إبدأ اللف الآن!</button>
    </div>

    <div class="inventory-section">
        <h3>🎒 حقيبتك (Inventory)</h3>
        <p style="font-size: 13px; color: #666;">اختر لوناً لتطبيقه على اسمك في التعليقات والمنشورات</p>
        <div id="color-grid" class="color-grid">
            </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCMH9WZIHPYYtnAhCUjRWyq9alIHPX872E",
    authDomain: "kirafix-a0ed2.firebaseapp.com",
    projectId: "kirafix-a0ed2",
    storageBucket: "kirafix-a0ed2.firebasestorage.app",
    messagingSenderId: "1038377831293",
    appId: "1:103837103837:web:c4763c6157addb25a1da14"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// إعدادات الألوان والنسب
const colors = [
    { name: 'أحمر ناري', code: '#ff4757', chance: 40 },
    { name: 'أزرق ملكي', code: '#2e86de', chance: 30 },
    { name: 'أرجواني', code: '#8e44ad', chance: 20 },
    { name: 'أخضر فسفوري', code: '#2ecc71', chance: 7 },
    { name: 'ذهبي أسطوري', code: '#ffd700', chance: 3 } // نادر جداً
];

const canvas = document.getElementById("wheel-canvas");
const ctx = canvas.getContext("2d");
let currentRotation = 0;

// رسم العجلة
function drawWheel() {
    const sliceAngle = (2 * Math.PI) / colors.length;
    colors.forEach((color, i) => {
        ctx.beginPath();
        ctx.fillStyle = color.code;
        ctx.moveTo(250, 250);
        ctx.arc(250, 250, 250, i * sliceAngle, (i + 1) * sliceAngle);
        ctx.fill();
        
        ctx.save();
        ctx.translate(250, 250);
        ctx.rotate(i * sliceAngle + sliceAngle / 2);
        ctx.fillStyle = "white";
        ctx.font = "bold 20px Arial";
        ctx.fillText("K", 180, 10);
        ctx.restore();
    });
}
drawWheel();

onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    
    // مراقبة العملات والـ Inventory
    onSnapshot(doc(db, "users", user.uid), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById("user-coins").textContent = data.coins || 0;
            renderInventory(data.inventory || [], data.activeColor);
        }
    });
});

async function spin() {
    const userRef = doc(db, "users", auth.currentUser.uid);
    const userDoc = await getDoc(userRef);
    const coins = userDoc.data().coins || 0;

    if (coins < 100) { alert("رصيدك لا يكفي (100 كوين)"); return; }

    const btn = document.getElementById("spinBtn");
    btn.disabled = true;

    // خصم الكوينات
    await updateDoc(userRef, { coins: increment(-100) });

    // تحديد الفائز بناءً على الاحتمالات
    let totalChance = colors.reduce((s, c) => s + c.chance, 0);
    let random = Math.random() * totalChance;
    let winningIndex = 0;
    for (let i = 0; i < colors.length; i++) {
        if (random < colors[i].chance) { winningIndex = i; break; }
        random -= colors[i].chance;
    }

    // حساب زاوية التوقف (عكس عقارب الساعة عشان السهم فوق)
    const sliceAngle = 360 / colors.length;
    const extraSpins = 5 * 360; 
    const stopAngle = extraSpins + (360 - (winningIndex * sliceAngle) - (sliceAngle/2));
    
    currentRotation += stopAngle;
    canvas.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(async () => {
        const winner = colors[winningIndex];
        alert(`🎉 مبروك! حصلت على لون: ${winner.name}`);
        
        await updateDoc(userRef, {
            inventory: arrayUnion(winner.code)
        });
        btn.disabled = false;
    }, 4000);
}

function renderInventory(items, activeColor) {
    const grid = document.getElementById("color-grid");
    grid.innerHTML = "";
    
    // إضافة اللون الافتراضي (الأسود/الأبيض)
    const defaultColor = { code: '#374151', name: 'افتراضي' };
    [defaultColor, ...new Set(items)].forEach(colorCode => {
        const item = document.createElement("div");
        item.className = `color-item ${activeColor === colorCode ? 'active' : ''}`;
        item.style.backgroundColor = (typeof colorCode === 'string') ? colorCode : colorCode.code;
        
        item.onclick = async () => {
            const finalCode = (typeof colorCode === 'string') ? colorCode : colorCode.code;
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                activeColor: finalCode
            });
        };
        grid.appendChild(item);
    });
}

document.getElementById("spinBtn").onclick = spin;

// تفعيل الدارك مود لو مخزن
if(localStorage.getItem('kirafix-dark') === 'true') document.body.classList.add('dark-mode');
</script>

</body>
</html>
