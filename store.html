        body {

        .item-box { width: 50px; height: 50px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; display: flex; align-items: center; justify-content: center; background: #eee; position: relative; transition: 0.2s; }

        /* Badge Market */
        .badge-market {
            display: grid;

        body.dark-mode .badge-buy-card { background: #111827; border-color: #374151; }
        .badge-buy-card:hover { border-color: var(--gold); transform: translateY(-3px); }

        /* Inventory */
        .color-grid, .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 15px;
            margin-top: 15px;
            justify-items: center;
        }
        .item-box {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
            position: relative;
            display: flex;

            background: #eee;
            font-size: 18px;
        }
        body.dark-mode .item-box { background: #111827; }
        .item-box.active { border-color: var(--gold); transform: scale(1.1); }
        .item-box.rainbow { background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff) !important; background-size: 200% 200% !important; animation: rainbowBG 2s linear infinite !important; }
        .item-box.active::after {
            content: '✓';

        }

        /* --- الألقاب بتصميم بسيط (Simple Badges) --- */

            background: #fee2e2 !important;

            border: 1px solid #fecaca !important;

        }

            box-shadow: none !important;

        }
        /* الأوسمة العادية من المتجر */
        .badge-verified { background: #dbeafe !important; color: #2563eb !important; border: 1px solid #bfdbfe !important; }
        .badge-king { background: #fef3c7 !important; color: #d97706 !important; border: 1px solid #fde68a !important; }
        .badge-vip { background: #dcfce7 !important; color: #16a34a !important; border: 1px solid #bbf7d0 !important; }

        .item-box.rainbow {
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff) !important;
            background-size: 200% 200% !important;
            animation: rainbowBG 2s linear infinite !important;
        }
        @keyframes rainbowBG { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
        .buy-coin-btn { background: #25d366 !important; color: white !important; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        /* [نفس الـ CSS بتاعك بدون أي تعديل في الشكل] */
        .section-title { font-size: 14px; color: #888; margin-top: 20px; text-align: right; width: 100%; }
    /* تنسيق شبكة الأسعار */
.coins-pricing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

    border: 1px solid #e5e7eb;
    border-radius: 15px;

    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

body.dark-mode .price-card { background: #111827; border-color: #374151; }

.price-card:hover {
    transform: translateY(-5px);
    border-color: var(--gold);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.coin-icon-wrapper { font-size: 35px; margin-bottom: 10px; }
.coin-amount { font-weight: 800; font-size: 16px; margin-bottom: 5px; }
.coin-price { color: #10b981; font-weight: bold; font-size: 18px; margin-bottom: 15px; }

.buy-coin-btn {
    background: #f3f4f6;
    border: none;
    padding: 8px 15px;
    border-radius: 10px;

/* تمييز الباقات الخاصة */
.price-card.popular { border: 2px solid var(--gold); }
.popular-badge {
    position: absolute;
    top: 0;
    left: 50%;

    .badge-benefit {

body.dark-mode .post,

body.dark-mode .composer,

body.dark-mode div[style*="background: white"] {

<body>

<div class="container">
<a href="index.html" class="home-btn">🏠 العودة للرئيسية</a>

<div class="store-card">
<button id="dailyBtn" class="daily-btn">🎁 استلام الهدية اليومية</button>
<button id="followInstaBtn" class="daily-btn">📸 متابعة إنستجرام +50 كوين</button>

<h2>🎡 Kirafix Lucky Wheel</h2>

<div class="balance-box">
<span>رصيدك:</span>
<span id="user-coins">0</span>
<span>🪙</span>
</div>

<p>تكلفة اللفة: 100 كوين</p>

<div class="wheel-container">
<div class="pointer"></div>
<canvas id="wheel-canvas" width="500" height="500"></canvas>
</div>

<button id="spinBtn" class="spin-btn">إبدأ اللف الآن!</button>
</div>

<div class="store-card">
<h3>🎖️ متجر الأوسمة والتوثيق</h3>
<div class="badge-market" id="badge-market"></div>
</div>

<div class="inventory-section">
<h3>🎒 حقيبتك (Inventory)</h3>
<div class="section-title">🎨 الألوان المفتوحة:</div>
<div id="color-grid" class="color-grid"></div>

<div class="section-title">🎖️ الأوسمة المفتوحة:</div>
<div id="badge-grid" class="badge-grid"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "kirafix-a0ed2.firebaseapp.com",
projectId: "kirafix-a0ed2",
storageBucket: "kirafix-a0ed2.firebasestorage.app",
messagingSenderId: "1038377831293",
appId: "1:103837103837:web:c4763c6157addb25a1da14"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔊 أصوات */
const spinSound = new Audio('https://assets.mixkit.co/active_storage/sfx/1471/1471-preview.mp3');
const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

/* 🎡 الألوان */
const colors = [
{ id: 'red', ar: 'أحمر', en: 'Red', code: 'red', chance: 24 },
{ id: 'green', ar: 'أخضر', en: 'Green', code: 'green', chance: 24 },
{ id: 'blue', ar: 'أزرق', en: 'Blue', code: 'blue', chance: 24 },
{ id: 'gold', ar: 'جولد', en: 'Gold', code: 'gold', chance: 1 },
{ id: 'blood', ar: 'دموي', en: 'Blood', code: 'blood', chance: 1 },
{ id: 'rainbow', ar: 'رينبو', en: 'Rainbow', code: 'RAINBOW_SPECIAL', chance: 0.1 }
];

/* 🎡 رسم العجلة */
function drawWheel() {
const canvas = document.getElementById("wheel-canvas");
const ctx = canvas.getContext("2d");

const slice = (2 * Math.PI) / colors.length;

colors.forEach((c, i) => {
ctx.beginPath();
ctx.moveTo(250, 250);
ctx.arc(250, 250, 250, i * slice, (i + 1) * slice);
ctx.fillStyle = i % 2 ? "#374151" : "#1f2937";
ctx.fill();

ctx.save();
ctx.translate(250, 250);
ctx.rotate(i * slice + slice / 2);
ctx.fillStyle = "#fff";
ctx.fillText(c.ar, 180, 0);
ctx.restore();
});
}

drawWheel();

/* 🎁 اليومية */
document.getElementById("dailyBtn").onclick = async () => {
const userRef = doc(db, "users", auth.currentUser.uid);
await updateDoc(userRef, {
coins: increment(50),
lastDaily: serverTimestamp()
});
confetti();
};

/* 🎡 اللف */
let rotation = 0;

document.getElementById("spinBtn").onclick = async () => {

const userRef = doc(db, "users", auth.currentUser.uid);
const snap = await getDoc(userRef);

if ((snap.data().coins || 0) < 100) {
alert("رصيدك مش كفاية");
return;
}

await updateDoc(userRef, { coins: increment(-100) });

spinSound.play();

const winIndex = Math.floor(Math.random() * colors.length);
rotation += 360 * 5 + (360 / colors.length) * winIndex;

document.getElementById("wheel-canvas").style.transform =
`rotate(${rotation}deg)`;

setTimeout(async () => {

spinSound.pause();
winSound.play();

const winner = colors[winIndex];

await updateDoc(userRef, {
inventory: arrayUnion(winner.code)
});

confetti();
alert("كسبت: " + winner.ar);

}, 4000);

};

/* 👤 المستخدم */
onAuthStateChanged(auth, (user) => {

if (!user) return;

onSnapshot(doc(db, "users", user.uid), (snap) => {

if (!snap.exists()) return;

const data = snap.data();

document.getElementById("user-coins").textContent = data.coins || 0;

});

});

</script>

</body>
