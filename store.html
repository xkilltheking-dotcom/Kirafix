<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirafix - Store 🎡</title>
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        :root { --gold: #ffd700; --dark-bg: #111827; }
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 50px; }
        body.dark-mode { background-color: var(--dark-bg); color: white; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        
        .store-card, .inventory-section, .badges-section {
            background: white; border-radius: 20px; padding: 25px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 20px; border: 1px solid #eee;
        }
        body.dark-mode .store-card, body.dark-mode .inventory-section, body.dark-mode .badges-section { 
            background: #1f2937; border-color: #374151; 
        }

        .balance-box {
            background: var(--gold); color: #000; padding: 10px 25px;
            border-radius: 50px; display: inline-flex; align-items: center;
            gap: 10px; font-weight: bold; margin-bottom: 20px;
        }

        /* ستايل البادجات في المتجر */
        .badge-market {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;
        }
        .badge-item {
            background: #f9fafb; border: 2px solid #e5e7eb; padding: 15px;
            border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        body.dark-mode .badge-item { background: #111827; border-color: #374151; }
        .badge-item:hover { border-color: var(--gold); transform: translateY(-3px); }
        .badge-icon { font-size: 24px; display: block; margin-bottom: 5px; }
        .badge-price { color: #059669; font-weight: bold; font-size: 14px; }

        /* ستايل العجلة */
        .wheel-container { position: relative; width: 250px; height: 250px; margin: 20px auto; }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #374151; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; background: red; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        
        .spin-btn { background: #2563eb; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .spin-btn:disabled { background: #9ca3af; }

        .color-grid, .badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 15px; margin-top: 15px; }
        .color-item, .my-badge-item { width: 50px; height: 50px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; position: relative; display: flex; align-items: center; justify-content: center; background: #eee; }
        body.dark-mode .my-badge-item { background: #111827; }
        .color-item.active, .my-badge-item.active { border-color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="text-decoration:none; color:inherit;">🏠 العودة للرئيسية</a>

    <div class="store-card">
        <div class="balance-box">
            <span>رصيدك:</span> <span id="user-coins">0</span> <span>🪙</span>
        </div>
        
        <h3>🎡 عجلة الحظ</h3>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel-canvas" width="500" height="500"></canvas>
        </div>
        <button id="spinBtn" class="spin-btn">إبدأ اللف (100 🪙)</button>
    </div>

    <div class="badges-section">
        <h3>🎖️ متجر الأوسمة والتوثيق</h3>
        <div class="badge-market" id="badge-market">
            </div>
    </div>

    <div class="inventory-section">
        <h3>🎒 حقيبتك الخاصة</h3>
        <p>الألوان المفتوحة:</p>
        <div id="color-grid" class="color-grid"></div>
        <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
        <p>الأوسمة المفتوحة:</p>
        <div id="badge-grid" class="badge-grid"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCMH9WZIHPYYtnAhCUjRWyq9alIHPX872E",
    authDomain: "kirafix-a0ed2.firebaseapp.com",
    projectId: "kirafix-a0ed2",
    storageBucket: "kirafix-a0ed2.firebasestorage.app",
    messagingSenderId: "1038377831293",
    appId: "1:103837103837:web:c4763c6157addb25a1da14"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// إعدادات الألوان والبادجات
const colors = [
    { name: 'أحمر', code: 'linear-gradient(135deg, #ff4d4d, #cc0000)', chance: 24.0 },
    { name: 'أخضر', code: 'linear-gradient(135deg, #4dff4d, #00cc00)', chance: 24.0 },
    { name: 'أصفر', code: 'linear-gradient(135deg, #ffff4d, #cccc00)', chance: 24.0 },
    { name: 'أزرق', code: 'linear-gradient(135deg, #4d4dff, #0000cc)', chance: 24.0 },
    { name: 'بنفسجي', code: 'linear-gradient(135deg, #b34dff, #7700cc)', chance: 24.0 },
    { name: 'جولد', code: 'linear-gradient(135deg, #ffd700, #b8860b)', chance: 1.0 },
    { name: 'رينبو', code: 'linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet)', chance: 0.1 }
];

const availableBadges = [
    { id: 'verified', name: 'توثيق الحساب', icon: '✔️', price: 5000 },
    { id: 'king', name: 'الملك', icon: '👑', price: 3000 },
    { id: 'vip', name: 'عضو VIP', icon: '✨', price: 1500 },
    { id: 'fire', name: 'متفاعل نار', icon: '🔥', price: 800 }
];

// رسم العجلة
const canvas = document.getElementById("wheel-canvas");
const ctx = canvas.getContext("2d");
function drawWheel() {
    const sliceAngle = (2 * Math.PI) / colors.length;
    colors.forEach((color, i) => {
        ctx.beginPath();
        ctx.fillStyle = color.code.includes('gradient') ? '#ffd700' : color.code;
        ctx.moveTo(250, 250);
        ctx.arc(250, 250, 250, i * sliceAngle, (i + 1) * sliceAngle);
        ctx.fill();
        ctx.save();
        ctx.translate(250, 250); ctx.rotate(i * sliceAngle + sliceAngle / 2);
        ctx.fillStyle = "white"; ctx.font = "bold 16px Arial";
        ctx.fillText(color.name[0], 180, 5); ctx.restore();
    });
}
drawWheel();

// عرض بادجات المتجر
function renderBadgeMarket() {
    const market = document.getElementById("badge-market");
    market.innerHTML = availableBadges.map(b => `
        <div class="badge-item" onclick="window.buyBadge('${b.id}', ${b.price})">
            <span class="badge-icon">${b.icon}</span>
            <span style="display:block; font-size:12px; font-weight:bold;">${b.name}</span>
            <span class="badge-price">${b.price} 🪙</span>
        </div>
    `).join('');
}
renderBadgeMarket();

// وظيفة شراء البادج
window.buyBadge = async (badgeId, price) => {
    const user = auth.currentUser;
    const userRef = doc(db, "users", user.uid);
    const userDoc = await getDoc(userRef);
    const coins = userDoc.data().coins || 0;
    const myBadges = userDoc.data().inventoryBadges || [];

    if (myBadges.includes(badgeId)) return alert("أنت تمتلك هذا الوسام بالفعل!");
    if (coins < price) return alert("رصيدك لا يكفي لشراء هذا الوسام");

    if (confirm(`هل تريد شراء وسام ${badgeId} مقابل ${price} كوين؟`)) {
        await updateDoc(userRef, {
            coins: increment(-price),
            inventoryBadges: arrayUnion(badgeId)
        });
        alert("مبروك! تم إضافة الوسام لحقيبتك.");
    }
};

onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    onSnapshot(doc(db, "users", user.uid), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById("user-coins").textContent = data.coins || 0;
            renderInventory(data.inventory || [], data.activeColor);
            renderBadgeInventory(data.inventoryBadges || [], data.activeBadge);
        }
    });
});

function renderInventory(items, activeColor) {
    const grid = document.getElementById("color-grid");
    grid.innerHTML = "";
    [...new Set(items)].forEach(code => {
        const div = document.createElement("div");
        div.className = `color-item ${activeColor === code ? 'active' : ''}`;
        div.style.background = code;
        div.onclick = () => updateDoc(doc(db, "users", auth.currentUser.uid), { activeColor: code });
        grid.appendChild(div);
    });
}

function renderBadgeInventory(myBadges, activeBadge) {
    const grid = document.getElementById("badge-grid");
    grid.innerHTML = "";
    myBadges.forEach(id => {
        const badgeData = availableBadges.find(b => b.id === id);
        if (!badgeData) return;
        const div = document.createElement("div");
        div.className = `my-badge-item ${activeBadge === id ? 'active' : ''}`;
        div.innerHTML = `<span>${badgeData.icon}</span>`;
        div.onclick = () => updateDoc(doc(db, "users", auth.currentUser.uid), { activeBadge: id });
        grid.appendChild(div);
    });
}

// كود اللف (Spin) نفس اللي عندك مع تغيير بسيط في الـ Inventory
let currentRotation = 0;
document.getElementById("spinBtn").onclick = async () => {
    const userRef = doc(db, "users", auth.currentUser.uid);
    const userDoc = await getDoc(userRef);
    if ((userDoc.data().coins || 0) < 100) return alert("لا يوجد كوينز!");
    
    document.getElementById("spinBtn").disabled = true;
    await updateDoc(userRef, { coins: increment(-100) });

    let winningIndex = Math.floor(Math.random() * colors.length); // تبسيط للتيست
    currentRotation += (360 * 5) + (360 - (winningIndex * (360/colors.length)));
    canvas.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(async () => {
        await updateDoc(userRef, { inventory: arrayUnion(colors[winningIndex].code) });
        document.getElementById("spinBtn").disabled = false;
    }, 4000);
};

</script>
</body>
</html>
