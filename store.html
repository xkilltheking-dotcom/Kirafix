<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirafix - Store 🎡</title>
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        :root {
            --gold: #ffd700;
            --dark-bg: #111827;
        }

        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        body.dark-mode {
            background-color: var(--dark-bg);
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }

        .home-btn {
            display: inline-block;
            margin-bottom: 15px;
            padding: 10px 20px;
            background: #fff;
            color: #111;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        body.dark-mode .home-btn { background: #1f2937; color: white; }
        .home-btn:hover { transform: scale(1.05); background: var(--gold); color: black; }

        .store-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid var(--gold);
        }
        body.dark-mode .store-card { background: #1f2937; border-color: #374151; }

        .balance-box {
            background: var(--gold);
            color: #000;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .wheel-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 20px auto;
        }

        #wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #374151;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: red;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .spin-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .spin-btn:disabled { background: #9ca3af; cursor: not-allowed; }

        .inventory-section {
            margin-top: 40px;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        body.dark-mode .inventory-section { background: #1f2937; }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .color-item {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.2s;
            position: relative;
        }

        .color-item.rainbow { 
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 200% 200%;
            animation: rainbowBG 2s linear infinite;
        }
        @keyframes rainbowBG { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }

        .color-item.active { border-color: var(--gold); transform: scale(1.1); }
        .color-item.active::after {
            content: '✓';
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--gold);
            color: black;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="home-btn">🏠 العودة للرئيسية</a>

    <div class="store-card">
        <h2>🎡 Kirafix Lucky Wheel</h2>
        <div class="balance-box">
            <span>رصيدك:</span>
            <span id="user-coins">0</span>
            <span>🪙</span>
        </div>
        
        <p>تكلفة اللفة الواحدة 100 كوين</p>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel-canvas" width="500" height="500"></canvas>
        </div>

        <button id="spinBtn" class="spin-btn">إبدأ اللف الآن!</button>
    </div>

    <div class="inventory-section">
        <h3>🎒 حقيبتك (Inventory)</h3>
        <p style="font-size: 13px; color: #666;">اختر لوناً لتطبيقه على اسمك في التعليقات والمنشورات</p>
        <div id="color-grid" class="color-grid"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCMH9WZIHPYYtnAhCUjRWyq9alIHPX872E",
    authDomain: "kirafix-a0ed2.firebaseapp.com",
    projectId: "kirafix-a0ed2",
    storageBucket: "kirafix-a0ed2.firebasestorage.app",
    messagingSenderId: "1038377831293",
    appId: "1:103837103837:web:c4763c6157addb25a1da14"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const colors = [
    { name: 'أحمر', code: 'linear-gradient(135deg, #ff4d4d, #cc0000)', chance: 24.0 },
    { name: 'أخضر', code: 'linear-gradient(135deg, #4dff4d, #00cc00)', chance: 24.0 },
    { name: 'أصفر', code: 'linear-gradient(135deg, #ffff4d, #cccc00)', chance: 24.0 },
    { name: 'أزرق', code: 'linear-gradient(135deg, #4d4dff, #0000cc)', chance: 24.0 },
    { name: 'بنفسجي', code: 'linear-gradient(135deg, #b34dff, #7700cc)', chance: 24.0 },
    { name: 'جولد', code: 'linear-gradient(135deg, #ffd700, #b8860b)', chance: 1.0 },
    { name: 'دموي', code: 'linear-gradient(135deg, #8a0303, #4a0000)', chance: 1.0 },
    { name: 'خشبي', code: 'linear-gradient(135deg, #8b4513, #5d2e0a)', chance: 1.0 },
    { name: 'سيلفر', code: 'linear-gradient(135deg, #e0e0e0, #757575)', chance: 1.0 },
    { name: 'رينبو', code: 'linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet)', chance: 0.1 }
];

const canvas = document.getElementById("wheel-canvas");
const ctx = canvas.getContext("2d");
let currentRotation = 0;

function drawWheel() {
    const sliceAngle = (2 * Math.PI) / colors.length;
    colors.forEach((color, i) => {
        ctx.beginPath();
        if (color.code === 'RAINBOW_SPECIAL') {
            ctx.fillStyle = '#ffffff'; 
        } else {
            ctx.fillStyle = color.code.includes('gradient') ? '#ffd700' : color.code;
        }
        ctx.moveTo(250, 250);
        ctx.arc(250, 250, 250, i * sliceAngle, (i + 1) * sliceAngle);
        ctx.fill();
        
        ctx.save();
        ctx.translate(250, 250);
        ctx.rotate(i * sliceAngle + sliceAngle / 2);
        ctx.fillStyle = "white";
        ctx.font = "bold 16px Arial";
        ctx.fillText(color.name[0], 180, 5); 
        ctx.restore();
    });
}
drawWheel();

onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    onSnapshot(doc(db, "users", user.uid), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            const rawCoins = data.coins || 0;
            document.getElementById("user-coins").textContent = rawCoins >= 1000000 ? (rawCoins/1000000).toFixed(1) + 'M' : rawCoins;
            renderInventory(data.inventory || [], data.activeColor);
        }
    });
});

async function spin() {
    const userRef = doc(db, "users", auth.currentUser.uid);
    const userDoc = await getDoc(userRef);
    const coins = userDoc.data().coins || 0;

    if (coins < 100) { alert("رصيدك لا يكفي (100 كوين)"); return; }

    const btn = document.getElementById("spinBtn");
    btn.disabled = true;

    await updateDoc(userRef, { coins: increment(-100) });

    let totalWeight = colors.reduce((s, c) => s + c.chance, 0);
    let random = Math.random() * totalWeight;
    let winningIndex = 0;
    
    let sum = 0;
    for (let i = 0; i < colors.length; i++) {
        sum += colors[i].chance;
        if (random <= sum) {
            winningIndex = i;
            break;
        }
    }

    const sliceAngle = 360 / colors.length;
    const extraSpins = 8 * 360; 
    const stopAngle = extraSpins + (360 - (winningIndex * sliceAngle) - (sliceAngle/2));
    
    currentRotation += stopAngle;
    canvas.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(async () => {
        const winner = colors[winningIndex];
        alert(`🎉 مبروك! حصلت على لون: ${winner.name}`);
        
        await updateDoc(userRef, {
            inventory: arrayUnion(winner.code)
        });
        btn.disabled = false;
    }, 4000);
}

function renderInventory(items, activeColor) {
    const grid = document.getElementById("color-grid");
    grid.innerHTML = "";
    
    const defaultColor = '#374151';
    const allItems = [defaultColor, ...new Set(items)];

    allItems.forEach(colorCode => {
        const item = document.createElement("div");
        item.className = `color-item ${activeColor === colorCode ? 'active' : ''}`;
        
        if (colorCode === 'RAINBOW_SPECIAL') {
            item.classList.add('rainbow');
        } else if (colorCode.includes('gradient')) {
            item.style.background = colorCode;
        } else {
            item.style.backgroundColor = colorCode;
        }
        
        item.onclick = async () => {
            await updateDoc(doc(db, "users", auth.currentUser.uid), {
                activeColor: colorCode
            });

            localStorage.setItem("kirafix-activeColor", colorCode); // 👈 الإضافة الوحيدة
        };
        grid.appendChild(item);
    });
}

document.getElementById("spinBtn").onclick = spin;

if(localStorage.getItem('kirafix-dark') === 'true') document.body.classList.add('dark-mode');
</script>

</body>
</html>
