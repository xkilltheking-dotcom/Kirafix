<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon_fixed.png?v=2.0">
    <link rel="apple-touch-icon" href="./favicon_fixed.png?v=2.0">
    <title>Kirafix - Store 🎡</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #ffd700;
            --dark-bg: #111827;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --text-secondary: #65676b;
        }

        body.dark-mode {
            --bg-color: #18191a;
            --card-bg: #242526;
            --text-main: #e4e6eb;
            --text-secondary: #b0b3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            transition: 0.3s;
        }

        .container { max-width: 600px; margin: 20px auto; padding: 20px; }

        .home-btn {
            display: inline-block; margin-bottom: 15px; padding: 10px 20px;
            background: var(--card-bg); color: var(--text-main);
            text-decoration: none; border-radius: 12px; font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s;
        }

        .store-card, .inventory-section {
            background: var(--card-bg); border-radius: 20px; padding: 30px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid var(--gold); margin-bottom: 20px;
        }

        .balance-box {
            background: var(--gold); color: #000; padding: 10px 20px;
            border-radius: 50px; display: inline-flex; align-items: center;
            gap: 10px; font-weight: bold; margin-bottom: 20px;
        }

        .daily-btn {
            background: #10b981; color: white; border: none; padding: 8px 15px;
            border-radius: 10px; cursor: pointer; font-weight: bold;
            margin-bottom: 15px; display: block; width: 100%; transition: 0.3s;
        }

        .wheel-container { position: relative; width: 250px; height: 250px; margin: 20px auto; }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #374151; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; background: red; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }

        .spin-btn { background: #2563eb; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .badge-market { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin: 20px 0; }
        .badge-buy-card { background: var(--bg-color); padding: 15px; border-radius: 15px; border: 1px solid #e5e7eb; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 160px; }

        .color-grid, .badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 15px; margin-top: 15px; justify-items: center; }
        .item-box { width: 50px; height: 50px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; display: flex; align-items: center; justify-content: center; background: #eee; }
        .item-box.active { border-color: var(--gold); transform: scale(1.1); }

        .coins-pricing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .price-card { background: var(--card-bg); border: 1px solid #e5e7eb; border-radius: 15px; padding: 20px 10px; text-align: center; transition: 0.3s; }
        .buy-coin-btn { background: #f3f4f6; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px;}
        
        .item-box.rainbow { background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff) !important; background-size: 200% 200% !important; animation: rainbowBG 2s linear infinite !important; }
        @keyframes rainbowBG { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="home-btn">🏠</a>

    <div class="store-card">
        <button id="dailyBtn" class="daily-btn">🎁</button>
        <h2 id="wheel-title">🎡 Kirafix Lucky Wheel</h2>
        <div class="balance-box">
            <span id="balance-label">رصيدك:</span>
            <span id="user-coins">0</span>
            <span>🪙</span>
        </div>
        <p id="spin-cost-text">تكلفة اللفة: 100 كوين</p>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel-canvas" width="500" height="500"></canvas>
        </div>
        <button id="spinBtn" class="spin-btn">إبدأ اللف الآن!</button>
    </div>

    <div class="store-card">
        <h3 id="tasks-title">📱 مهام السوشيال ميديا</h3>
        <div id="insta-task-box" style="display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 24px;">📸</span>
                <div style="text-align: right;">
                    <div id="insta-text-title" style="font-weight: bold; font-size: 14px;"></div>
                    <div id="insta-reward-text" style="font-size: 12px; color: #10b981;"></div>
                </div>
            </div>
            <button id="instaBtn" class="buy-coin-btn" style="width: auto; background: #e1306c; color: white;">Follow</button>
        </div>
    </div>

    <div class="store-card">
        <h3 id="market-title">🎖️ متجر الأوسمة والتوثيق</h3>
        <div class="badge-market" id="badge-market"></div>
    </div>

    <div class="store-card">
        <h3 id="charge-title">💰 شحن رصيد الكوينز</h3>
        <div id="manual-recharge-alert" style="background: #fef3c7; border: 1px solid #f59e0b; color: #92400e; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; font-size: 14px;"></div>
        
        <div class="coins-pricing-grid">
            <div class="price-card">
                <div style="font-size:30px">🪙</div>
                <div class="coin-amount">100 كوين</div>
                <div style="color:#10b981; font-weight:bold">$0.99</div>
                <button onclick="window.open('https://wa.me/201283380890', '_blank')" class="buy-coin-btn buy-now-label">شراء</button>
            </div>
            <div class="price-card">
                <div style="font-size:30px">💎</div>
                <div class="coin-amount">500 كوين</div>
                <div style="color:#10b981; font-weight:bold">$3.50</div>
                <button onclick="window.open('https://wa.me/201283380890', '_blank')" class="buy-coin-btn buy-now-label">شراء</button>
            </div>
        </div>
    </div>

    <div class="inventory-section">
        <h3 id="inv-title">🎒 حقيبتك (Inventory)</h3>
        <div class="section-title" id="inv-colors-label">🎨 الألوان المفتوحة:</div>
        <div id="color-grid" class="color-grid"></div>
        <div class="section-title" id="inv-badges-label">🎖️ الأوسمة المفتوحة:</div>
        <div id="badge-grid" class="badge-grid"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCMH9WZIHPYYtnAhCUjRWyq9alIHPX872E",
    authDomain: "kirafix-a0ed2.firebaseapp.com",
    projectId: "kirafix-a0ed2",
    storageBucket: "kirafix-a0ed2.firebasestorage.app",
    messagingSenderId: "1038377831293",
    appId: "1:103837103837:web:c4763c6157addb25a1da14"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const spinSound = new Audio('https://assets.mixkit.co/active_storage/sfx/1471/1471-preview.mp3');
const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

const colors = [
    { id: 'red', ar: 'أحمر', en: 'Red', code: 'linear-gradient(135deg, #ff4d4d, #cc0000)', chance: 24.0 },
    { id: 'green', ar: 'أخضر', en: 'Green', code: 'linear-gradient(135deg, #4dff4d, #00cc00)', chance: 24.0 },
    { id: 'blue', ar: 'أزرق', en: 'Blue', code: 'linear-gradient(135deg, #4d4dff, #0000cc)', chance: 24.0 },
    { id: 'gold', ar: 'جولد', en: 'Gold', code: 'linear-gradient(135deg, #ffd700, #b8860b)', chance: 1.0 },
    { id: 'blood', ar: 'دموي', en: 'Blood', code: 'linear-gradient(135deg, #8a0303, #4a0000)', chance: 1.0 },
    { id: 'rainbow', ar: 'رينبو', en: 'Rainbow', code: 'RAINBOW_SPECIAL', chance: 0.1 }
];

const availableBadges = [
    { id: 'sticker', icon: '📌', price: 3000, ar: 'المثبت', en: 'Sticker', bAr: 'تثبيت منشورك في المقدمة لمدة ساعة.', bEn: 'Pin your post at the top for 1 hour.' },
    { id: 'glow', icon: '✨', price: 7500, ar: 'المتوهج', en: 'Glow', bAr: 'إطار مضيء وتأثير بصري يضاعف التفاعل.', bEn: 'Glowing frame and visual effect to boost engagement.' },
    { id: 'global', icon: '🌍', price: 12000, ar: 'العابر', en: 'Global', bAr: 'إرسال تنبيه فوري لجميع المستخدمين.', bEn: 'Send instant notification to all users.' },
    { id: 'radar', icon: '📡', price: 18000, ar: 'الرادار', en: 'Radar', bAr: 'ظهور منشورك كإعلان إجباري (Pop-up).', bEn: 'Your post appears as a mandatory Pop-up.' },
    { id: 'infinity', icon: '🚀', price: 35000, ar: 'الناشر اللانهائي', en: 'Infinity', bAr: 'تكرار تلقائي لمنشورك كل ساعتين.', bEn: 'Auto-repeat your post every 2 hours.' }
];

function applyLanguageStrings(lang) {
    const t = {
        ar: {
            back: "🏠 العودة للرئيسية", daily: "🎁 استلام الهدية اليومية", wheel: "🎡 Kirafix Lucky Wheel", balance: "رصيدك:", cost: "تكلفة اللفة: 100 كوين", spin: "إبدأ اللف الآن!", market: "🎖️ متجر الأوسمة والتوثيق", inv: "🎒 حقيبتك (Inventory)", colors: "🎨 الألوان المفتوحة:", badges: "🎖️ الأوسمة المفتوحة:", charge: "💰 شحن رصيد الكوينز", buy: "شراء يدوي", unit: "كوين",
            manualMsg: `⚠️ الخدمة غير متاحة أوتوماتيكياً حالياً.<br>للشحن اليدوي تواصل واتساب:<br><a href="https://wa.me/201283380890" style="color:#059669; font-size:18px;">01283380890</a>`,
            tasks: "📱 مهام السوشيال ميديا", instaT: "متابعة إنستجرام", instaR: "+150 كوين 🪙", instaB: "متابعة"
        },
        en: {
            back: "🏠 Back to Home", daily: "🎁 Claim Daily Gift", wheel: "🎡 Kirafix Lucky Wheel", balance: "Balance:", cost: "Spin Cost: 100 Coins", spin: "Spin Now!", market: "🎖️ Badge & Verification Store", inv: "🎒 Your Inventory", colors: "🎨 Unlocked Colors:", badges: "🎖️ Unlocked Badges:", charge: "💰 Top Up Coins", buy: "Manual Buy", unit: "Coins",
            manualMsg: `⚠️ Auto-service is unavailable.<br>Contact via WhatsApp for manual recharge:<br><a href="https://wa.me/201283380890" style="color:#059669; font-size:18px;">01283380890</a>`,
            tasks: "📱 Social Media Tasks", instaT: "Follow Instagram", instaR: "+150 Coins 🪙", instaB: "Follow"
        }
    }[lang];

    document.querySelector('.home-btn').textContent = lang === 'ar' ? "🏠" : "🏠"; 
    document.getElementById('dailyBtn').textContent = t.daily;
    document.getElementById('wheel-title').textContent = t.wheel;
    document.getElementById('balance-label').textContent = t.balance;
    document.getElementById('spin-cost-text').textContent = t.cost;
    document.getElementById('spinBtn').textContent = t.spin;
    document.getElementById('market-title').textContent = t.market;
    document.getElementById('charge-title').textContent = t.charge;
    document.getElementById('manual-recharge-alert').innerHTML = t.manualMsg;
    document.getElementById('tasks-title').textContent = t.tasks;
    document.getElementById('insta-text-title').textContent = t.instaT;
    document.getElementById('insta-reward-text').textContent = t.instaR;
    if(document.getElementById('instaBtn').textContent !== "✅") document.getElementById('instaBtn').textContent = t.instaB;
    document.getElementById('inv-title').textContent = t.inv;
    document.getElementById('inv-colors-label').textContent = t.colors;
    document.getElementById('inv-badges-label').textContent = t.badges;
    document.querySelectorAll('.buy-now-label').forEach(b => b.textContent = t.buy);
}

function applyGlobalSettings() {
    const savedDark = localStorage.getItem('kirafix-dark') === 'true';
    document.body.classList.toggle('dark-mode', savedDark);
    const lang = localStorage.getItem('kirafix-lang') || 'ar';
    document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
    applyLanguageStrings(lang);
    renderMarket(lang);
    drawWheel(lang);
}

function renderMarket(lang) {
    const m = document.getElementById("badge-market");
    m.innerHTML = availableBadges.map(b => `
        <div class="badge-buy-card" onclick="window.buyBadge('${b.id}', ${b.price})">
            <div>
                <div style="font-size:30px">${b.icon}</div>
                <div style="font-size:14px; font-weight:bold; margin-top:5px">${lang === 'ar' ? b.ar : b.en}</div>
                <div style="font-size:11px; color:#6b7280;">${lang === 'ar' ? b.bAr : b.bEn}</div>
            </div>
            <div style="color:#10b981; font-size:15px; font-weight:bold; margin-top:10px">${b.price} 🪙</div>
        </div>
    `).join('');
}

function drawWheel(lang) {
    const canvas = document.getElementById("wheel-canvas");
    const ctx = canvas.getContext("2d");
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = canvas.width / 2;
    const sliceAngle = (2 * Math.PI) / colors.length;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    colors.forEach((color, i) => {
        ctx.beginPath();
        ctx.fillStyle = (i % 2 === 0) ? "#1f2937" : "#374151"; 
        if(color.id === 'gold') ctx.fillStyle = "#ffd700";
        if(color.id === 'rainbow') ctx.fillStyle = "#8b5cf6";
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, i * sliceAngle, (i + 1) * sliceAngle);
        ctx.fill();
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(i * sliceAngle + sliceAngle / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = color.id === 'gold' ? "#000" : "#fff";
        ctx.font = "bold 24px Arial";
        ctx.fillText(lang === 'ar' ? color.ar : color.en, radius - 30, 10);
        ctx.restore();
    });
}

onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "index.html"; return; }
    onSnapshot(doc(db, "users", user.uid), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById("user-coins").textContent = data.coins || 0;
            renderInventory(data.inventory || [], data.activeColor);
            renderBadgeInv(data.inventoryBadges || [], data.activeBadge);
            checkDailyStatus(data.lastDaily);
            if (data.completedTasks && data.completedTasks.includes('instagram_follow')) {
                const btn = document.getElementById("instaBtn");
                btn.disabled = true; btn.textContent = "✅";
                document.getElementById("insta-task-box").style.opacity = "0.6";
            }
        }
    });
});

document.getElementById("instaBtn").onclick = async () => {
    window.open('https://www.instagram.com/kirafix_web/?hl=ar', '_blank');
    setTimeout(async () => {
        const userRef = doc(db, "users", auth.currentUser.uid);
        await updateDoc(userRef, { coins: increment(150), completedTasks: arrayUnion('instagram_follow') });
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    }, 2000);
};

// --- باقي وظائف العجلة والحقيبة (بدون تغيير) ---
window.buyBadge = async (id, price) => {
    const userRef = doc(db, "users", auth.currentUser.uid);
    const snap = await getDoc(userRef);
    const data = snap.data();
    if ((data.inventoryBadges || []).includes(id)) return alert("Owned!");
    if ((data.coins || 0) < price) return alert("No coins!");
    if(confirm("Buy?")) {
        await updateDoc(userRef, { coins: increment(-price), inventoryBadges: arrayUnion(id) });
    }
};

let rotation = 0;
document.getElementById("spinBtn").onclick = async () => {
    const userRef = doc(db, "users", auth.currentUser.uid);
    const snap = await getDoc(userRef);
    if ((snap.data().coins || 0) < 100) return alert("No coins!");
    document.getElementById("spinBtn").disabled = true;
    spinSound.play();
    await updateDoc(userRef, { coins: increment(-100) });
    let winningIndex = Math.floor(Math.random() * colors.length); // تبسيط للمثال
    rotation += (360 * 5) + (360 - (winningIndex * (360/colors.length)));
    document.getElementById("wheel-canvas").style.transform = `rotate(${rotation}deg)`;
    setTimeout(async () => {
        winSound.play();
        await updateDoc(userRef, { inventory: arrayUnion(colors[winningIndex].code) });
        document.getElementById("spinBtn").disabled = false;
    }, 4000);
};

function renderInventory(items, active) {
    const grid = document.getElementById("color-grid");
    grid.innerHTML = "";
    ['#374151', ...new Set(items)].forEach(code => {
        const d = document.createElement("div");
        d.className = `item-box ${active === code ? 'active' : ''}`;
        d.style.background = code;
        d.onclick = () => updateDoc(doc(db, "users", auth.currentUser.uid), { activeColor: code });
        grid.appendChild(d);
    });
}

function renderBadgeInv(badges, active) {
    const grid = document.getElementById("badge-grid");
    grid.innerHTML = "";
    (badges || []).forEach(id => {
        const d = document.createElement("div");
        d.className = `item-box ${active === id ? 'active' : ''}`;
        d.innerHTML = "🎖️";
        d.onclick = () => updateDoc(doc(db, "users", auth.currentUser.uid), { activeBadge: id });
        grid.appendChild(d);
    });
}

async function checkDailyStatus(lastDaily) {
    if (!lastDaily) return;
    if (lastDaily.toDate().toLocaleDateString() === new Date().toLocaleDateString()) {
        document.getElementById("dailyBtn").disabled = true;
    }
}

document.getElementById("dailyBtn").onclick = async () => {
    await updateDoc(doc(db, "users", auth.currentUser.uid), { coins: increment(50), lastDaily: serverTimestamp() });
};

applyGlobalSettings();
</script>
</body>
</html>
