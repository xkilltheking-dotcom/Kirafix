<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" sizes="192x192" href="./favicon_fixed.png?v=2.0">
<link rel="apple-touch-icon" href="./favicon_fixed.png?v=2.0">

<title>Kirafix - Store 🎡</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
/* ❌ مغيرتش أي تصميم عندك نهائي */
:root {
--gold:#ffd700;
--dark-bg:#111827;
--bg-color:#f0f2f5;
--card-bg:#ffffff;
--text-main:#1c1e21;
--text-secondary:#65676b;
}

body.dark-mode{
--bg-color:#18191a;
--card-bg:#242526;
--text-main:#e4e6eb;
--text-secondary:#b0b3b8;
}

body{
background-color:var(--bg-color);
color:var(--text-main);
font-family:'Segoe UI';
margin:0;
padding-bottom:50px;
transition:.3s;
}

.container{max-width:600px;margin:20px auto;padding:20px;}

.home-btn{display:inline-block;margin-bottom:15px;padding:10px 20px;background:#fff;color:#111;text-decoration:none;border-radius:12px;font-weight:bold;box-shadow:0 4px 6px rgba(0,0,0,0.1);}

.store-card,.inventory-section{
background:var(--card-bg);
border-radius:20px;
padding:30px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
border:2px solid var(--gold);
margin-bottom:20px;
}

.balance-box{
background:var(--gold);
color:#000;
padding:10px 20px;
border-radius:50px;
display:inline-flex;
gap:10px;
font-weight:bold;
margin-bottom:20px;
}

.spin-btn{
background:#2563eb;
color:white;
border:none;
padding:15px 40px;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.coins-pricing-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
margin-top:20px;
}

.price-card{
background:#fff;
border:1px solid #e5e7eb;
border-radius:15px;
padding:20px 10px;
text-align:center;
}

.buy-coin-btn{
background:#f3f4f6;
border:none;
padding:8px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.manual-pay-warning{
margin:15px 0;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="home-btn">🏠 العودة للرئيسية</a>

<div class="store-card">
<button id="dailyBtn" class="daily-btn">🎁 استلام الهدية اليومية</button>

<h2>🎡 Kirafix Lucky Wheel</h2>

<div class="balance-box">
<span>رصيدك:</span>
<span id="user-coins">0</span>
<span>🪙</span>
</div>

<p>تكلفة اللفة: 100 كوين</p>

<button id="spinBtn" class="spin-btn">إبدأ اللف الآن!</button>
</div>

<!-- ⭐ الشحن اليدوي (اللي طلبته) -->
<div class="store-card">

<h3 id="chargeTitle">💰 شحن رصيد الكوينز</h3>

<div class="manual-pay-warning" id="manualWarning">
⚠️ الخدمة غير متاحة أوتوماتيكياً حالياً.<br>
للشحن اليدوي تواصل معنا واتساب:<br>
<a href="https://wa.me/201283380890" style="color:#10b981;font-size:18px;font-weight:bold;">
01283380890
</a>
</div>

<div class="coins-pricing-grid">

<div class="price-card">
<div class="coin-icon-wrapper">🪙</div>
<div class="coin-amount">100 <span class="coin-unit">كوين</span></div>
<div class="coin-price">$0.99</div>

<button onclick="window.open('https://wa.me/201283380890','_blank')" class="buy-coin-btn buyNowLabel">
شراء يدوي
</button>

</div>

</div>
</div>

<!-- ⭐ هدية الانستجرام -->
<div class="store-card">
<h3 id="instaTitle">🎁 هدية المتابعة</h3>

<p id="instaText">تابع حسابنا على إنستجرام وخد 200 كوين مجاناً</p>

<button id="instaBtn" class="spin-btn">📸 متابعة الآن</button>
</div>

</div>

<script>
/* ⭐ ترجمة */
const translations={
ar:{
charge:"💰 شحن رصيد الكوينز",
manual:"⚠️ الخدمة غير متاحة أوتوماتيكياً حالياً.",
buy:"شراء يدوي",
instaTitle:"🎁 هدية المتابعة",
instaText:"تابع حسابنا على إنستجرام وخد 200 كوين مجاناً",
instaBtn:"📸 متابعة الآن",
done:"تم استلام الهدية ✅"
},
en:{
charge:"💰 Top Up Coins",
manual:"⚠️ Manual payment only right now.",
buy:"Manual Buy",
instaTitle:"🎁 Follow Reward",
instaText:"Follow our Instagram and get 200 coins",
instaBtn:"📸 Follow Now",
done:"Reward Claimed ✅"
}
};

const lang=localStorage.getItem("kirafix-lang")||"ar";

document.getElementById("chargeTitle").textContent=translations[lang].charge;
document.getElementById("manualWarning").innerHTML=translations[lang].manual;
document.querySelector(".buyNowLabel").textContent=translations[lang].buy;

document.getElementById("instaTitle").textContent=translations[lang].instaTitle;
document.getElementById("instaText").textContent=translations[lang].instaText;
document.getElementById("instaBtn").textContent=translations[lang].instaBtn;

/* ⭐ هدية الانستجرام */
document.getElementById("instaBtn").onclick=()=>{
const taken=localStorage.getItem("instaReward");

window.open("https://www.instagram.com/kirafix_web/?hl=ar","_blank");

if(!taken){
let coins=parseInt(localStorage.getItem("coins")||0);
coins+=200;
localStorage.setItem("coins",coins);
localStorage.setItem("instaReward","true");

document.getElementById("user-coins").textContent=coins;

alert("🎉 تم إضافة 200 كوين!");
document.getElementById("instaBtn").textContent=translations[lang].done;
}else{
alert("تم استلام الهدية قبل كده");
}
};

/* ⭐ رصيد وهمي للتجربة */
let coins=parseInt(localStorage.getItem("coins")||0);
document.getElementById("user-coins").textContent=coins;
</script>

</body>
</html>
