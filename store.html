<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon_fixed.png?v=2.0">
    <title>Kirafix - Store 🎡</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #ffd700;
            --dark-bg: #111827;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1c1e21;
            --text-secondary: #65676b;
        }

        body.dark-mode {
            --bg-color: #18191a;
            --card-bg: #242526;
            --text-main: #e4e6eb;
            --text-secondary: #b0b3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
            transition: 0.3s;
        }

        /* [باقي الـ CSS بتاعك هنا بالحرف] */
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .home-btn { display: inline-block; margin-bottom: 15px; padding: 10px 20px; background: #fff; color: #111; text-decoration: none; border-radius: 12px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
        body.dark-mode .home-btn { background: #1f2937; color: white; }
        .store-card { background: var(--card-bg); border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 2px solid var(--gold); margin-bottom: 20px; position: relative; }
        .balance-box { background: var(--gold); color: #000; padding: 10px 20px; border-radius: 50px; display: inline-flex; align-items: center; gap: 10px; font-weight: bold; margin-bottom: 20px; }
        .wheel-container { position: relative; width: 250px; height: 250px; margin: 20px auto; }
        #wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #374151; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; background: red; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        .spin-btn { background: #2563eb; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .spin-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .item-box { width: 50px; height: 50px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; display: flex; align-items: center; justify-content: center; background: #eee; position: relative; transition: 0.2s; }
        .item-box.active { border-color: var(--gold); transform: scale(1.1); }
        .item-box.rainbow { background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff) !important; background-size: 200% 200% !important; animation: rainbowBG 2s linear infinite !important; }
        @keyframes rainbowBG { 0%{background-position:0% 50%} 100%{background-position:100% 50%} }
        .buy-coin-btn { background: #25d366 !important; color: white !important; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        /* [نفس الـ CSS بتاعك بدون أي تعديل في الشكل] */
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="home-btn">🏠 العودة للرئيسية</a>

    <div class="store-card">
        <button id="dailyBtn" class="daily-btn">🎁 استلام الهدية اليومية</button>
        <h2>🎡 Kirafix Lucky Wheel</h2>
        <div class="balance-box">
            <span>رصيدك:</span>
            <span id="user-coins">0</span>
            <span>🪙</span>
        </div>
        <p>تكلفة اللفة: 100 كوين</p>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheel-canvas" width="500" height="500"></canvas>
        </div>
        <button id="spinBtn" class="spin-btn">إبدأ اللف الآن!</button>
    </div>

    <div class="store-card">
        <h3>🎖️ متجر الأوسمة والتوثيق</h3>
        <div class="badge-market" id="badge-market"></div>
    </div>

    <div class="inventory-section">
        <h3>🎒 حقيبتك (Inventory)</h3>
        <div class="section-title">🎨 الألوان المفتوحة:</div>
        <div id="color-grid" class="color-grid"></div>
        <div class="section-title">🎖️ الأوسمة المفتوحة:</div>
        <div id="badge-grid" class="badge-grid"></div>
    </div>

    <div class="store-card">
        <h3>💰 شحن رصيد الكوينز</h3>
        <div class="coins-pricing-grid">
            <div class="price-card" onclick="initiatePayment(100, 0.99)">
                <div class="coin-icon-wrapper">🪙</div>
                <div class="coin-amount">100 كوين</div>
                <div class="coin-price">$0.99</div>
                <button class="buy-coin-btn">💬 اطلب عبر واتساب</button>
            </div>
            </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, increment, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCMH9WZIHPYYtnAhCUjRWyq9alIHPX872E",
    authDomain: "kirafix-a0ed2.firebaseapp.com",
    projectId: "kirafix-a0ed2",
    storageBucket: "kirafix-a0ed2.firebasestorage.app",
    messagingSenderId: "1038377831293",
    appId: "1:103837103837:web:c4763c6157addb25a1da14"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// أصوات اللعبة
const spinSound = new Audio('https://assets.mixkit.co/active_storage/sfx/1471/1471-preview.mp3');
const winSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3');

const colors = [
    { id: 'red', ar: 'أحمر', en: 'Red', code: 'linear-gradient(135deg, #ff4d4d, #cc0000)', chance: 24.0 },
    { id: 'green', ar: 'أخضر', en: 'Green', code: 'linear-gradient(135deg, #4dff4d, #00cc00)', chance: 24.0 },
    { id: 'blue', ar: 'أزرق', en: 'Blue', code: 'linear-gradient(135deg, #4d4dff, #0000cc)', chance: 24.0 },
    { id: 'gold', ar: 'جولد', en: 'Gold', code: 'linear-gradient(135deg, #ffd700, #b8860b)', chance: 1.0 },
    { id: 'blood', ar: 'دموي', en: 'Blood', code: 'linear-gradient(135deg, #8a0303, #4a0000)', chance: 1.0 },
    { id: 'rainbow', ar: 'رينبو', en: 'Rainbow', code: 'RAINBOW_SPECIAL', chance: 0.1 }
];

// منطق الشحن
window.initiatePayment = (amount, price) => {
    const lang = localStorage.getItem('kirafix-lang') || 'ar';
    const text = lang === 'ar' 
        ? `أهلاً Kirafix، أرغب في شحن باقة ${amount} كوين مقابل ${price}$` 
        : `Hello Kirafix, I want to buy ${amount} coins for $${price}`;
    window.open(`https://wa.me/201283380890?text=${encodeURIComponent(text)}`, '_blank');
};

// رسم العجلة بشكل دقيق
function drawWheel() {
    const canvas = document.getElementById("wheel-canvas");
    if(!canvas) return;
    const ctx = canvas.getContext("2d");
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const radius = canvas.width / 2;
    const sliceAngle = (2 * Math.PI) / colors.length;

    colors.forEach((color, i) => {
        ctx.beginPath();
        ctx.fillStyle = (i % 2 === 0) ? "#1f2937" : "#374151"; 
        if(color.id === 'gold') ctx.fillStyle = "#ffd700";
        if(color.id === 'rainbow') ctx.fillStyle = "#8b5cf6";
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, i * sliceAngle, (i + 1) * sliceAngle);
        ctx.fill();

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(i * sliceAngle + sliceAngle / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = color.id === 'gold' ? "#000" : "#fff";
        ctx.font = "bold 22px Arial";
        ctx.fillText(color.ar, radius - 40, 10);
        ctx.restore();
    });
}

// دوران العجلة
let currentRotation = 0;
document.getElementById("spinBtn").onclick = async () => {
    if (!auth.currentUser) return;
    const userRef = doc(db, "users", auth.currentUser.uid);
    const snap = await getDoc(userRef);
    const coins = snap.data().coins || 0;

    if (coins < 100) {
        alert("رصيدك غير كافٍ!");
        return;
    }

    const btn = document.getElementById("spinBtn");
    btn.disabled = true;
    spinSound.play();

    await updateDoc(userRef, { coins: increment(-100) });

    // حساب النتيجة
    const winningIndex = Math.floor(Math.random() * colors.length); // تبسيط للتيست
    const sliceDeg = 360 / colors.length;
    const extraSpin = (360 * 5); // 5 لفات كاملة
    const targetDeg = (colors.length - winningIndex) * sliceDeg - (sliceDeg / 2);
    
    currentRotation += extraSpin + targetDeg;
    document.getElementById("wheel-canvas").style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(async () => {
        spinSound.pause();
        spinSound.currentTime = 0;
        winSound.play();
        
        const winner = colors[winningIndex];
        await updateDoc(userRef, { inventory: arrayUnion(winner.code) });
        
        confetti({ particleCount: 150, spread: 70 });
        alert(`مبروك! كسبت لون: ${winner.ar}`);
        btn.disabled = false;
    }, 4000);
};

// متابعة حالة المستخدم
onAuthStateChanged(auth, (user) => {
    if (user) {
        onSnapshot(doc(db, "users", user.uid), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("user-coins").textContent = data.coins || 0;
                // استدعي وظائف الرندر هنا (Inventory, Badges)
            }
        });
    }
});

drawWheel();
</script>
</body>
</html>
