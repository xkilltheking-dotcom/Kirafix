<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirafix - Private Chat</title>
 <link rel="icon" type="image/png" sizes="192x192" href="./favicon_fixed.png?v=2.0">
<link rel="apple-touch-icon" href="./favicon_fixed.png?v=2.0">
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
        :root {
            --bg-page: #f0f2f5;
            --primary: #2563eb;
            --white: #ffffff;
            --border: #e5e7eb;
        }

        body { 
            margin: 0; 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-page); 
            height: 100dvh; /* استخدمنا dvh للارتفاع الديناميكي */
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden; 
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 100dvh; /* ملء الشاشة تماماً في كل الأوقات */
            background: var(--white);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* القائمة الجانبية */
        .chats-sidebar {
            width: 300px;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            background: #fff;
            flex-shrink: 0;
            transition: width 0.3s;
        }

        /* منطقة الشات */
        .chat-container { 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            background: var(--white);
            min-width: 0;
            height: 100%; /* ضمان ملء الارتفاع المتاح */
        }

        /* --- تعديلات الموبايل (جنب بعض بس القائمة أصغر) --- */
        @media (max-width: 768px) {
            .chats-sidebar {
                width: 70px; /* شريط صور فقط */
            }
            .sidebar-header {
                display: none;
            }
            .side-chat-details {
                display: none;
            }
            .side-chat-item {
                justify-content: center;
                padding: 10px 0;
            }
            .side-chat-img {
                margin: 0;
                width: 50px; /* تكبير الصورة شوية */
                height: 50px;
                border-radius: 12px; /* مربع بحواف ناعمة */
            }
            .main-wrapper {
                height: 100dvh;
                border-radius: 0;
            }
        }

        .chat-header { 
            padding: 10px 15px; 
            background: #fff; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0; /* منع الانضغاط */
        }

        .receiver-info { display: flex; align-items: center; gap: 10px; }
        #receiverImg { 
            width: 35px; 
            height: 35px; 
            border-radius: 12px; /* مربع بحواف ناعمة للبروفايل */
            object-fit: cover; 
            border: none; /* لغينا الإطار الملون */
        }
        #receiverName { font-weight: 700; color: #1c1e21; font-size: 14px; }

        #chatBox { 
            flex: 1; 
            background-color: #f8f9fa; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
        }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .mine { align-self: flex-end; }
        .theirs { align-self: flex-start; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; font-size: 13px; line-height: 1.4; }
        .mine .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .theirs .msg-bubble { background: #e4e6eb; color: #050505; border-bottom-left-radius: 2px; }
        .msg-time { font-size: 9px; opacity: 0.7; margin-top: 3px; display: block; }

        .input-bar { 
            padding: 10px; 
            background: #fff; 
            display: flex; 
            gap: 8px; 
            border-top: 1px solid var(--border); 
            flex-shrink: 0; /* منع الانضغاط */
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); /* حماية إضافية للآيفون */
        }
        #messageInput { 
            flex: 1; 
            padding: 10px 15px; 
            border: 1px solid #ddd; 
            border-radius: 20px; 
            outline: none; 
            font-size: 14px;
        }
        #sendBtn { 
            background: var(--primary); 
            color: #fff; 
            border: none; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
        }

        .sidebar-header { padding: 20px; font-weight: bold; font-size: 18px; border-bottom: 1px solid var(--border); }
        #sideChatsList { flex: 1; overflow-y: auto; }
        .side-chat-item { display: flex; align-items: center; padding: 12px 15px; text-decoration: none; color: inherit; border-bottom: 1px solid #f9f9f9; }
        .side-chat-item.active { background: #e7f3ff; border-right: 4px solid var(--primary); }
        .side-chat-img { 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; /* مربع بحواف ناعمة في القائمة */
            object-fit: cover; 
            margin-left: 12px; 
        }
    /* نقطة الإشعار الحمراء */
.unread-badge {
    width: 10px;
    height: 10px;
    background-color: #ef4444; /* لون أحمر */
    border-radius: 50%;
    margin-right: auto; /* يخليها تروح أقصى اليسار في العربي */
    box-shadow: 0 0 5px rgba(239, 68, 68, 0.5);
}

/* تمييز المحادثة غير المقروءة بخلفية مختلفة قليلاً */
.side-chat-item.unread {
    background-color: #f0f7ff;
    font-weight: bold;
}

.side-chat-last.unread-text {
    color: #2563eb !important;
    font-weight: bold;
}
    </style>
</head>
<body>
    <div class="main-wrapper">
    <aside class="chats-sidebar">
        <div class="sidebar-header">المحادثات</div>
        <div id="sideChatsList"></div>
    </aside>

    <div class="chat-container" style="box-shadow:none; margin:0; border-radius:0; max-width: none;">
        <header class="chat-header">
            <div class="receiver-info">
                <a href="Kirafix.html" style="text-decoration:none;">⬅️</a>
                <img src="af80e23deeb127837d30554452546196.jpg" id="receiverImg">
                <div>
                    <span id="receiverName">جاري التحميل...</span>
                    <div id="statusLabel" style="color:gray;">جاري التحقق...</div>
                </div>
            </div>
        </header>

        <div id="chatBox"></div>

        <div class="input-bar">
            <input type="text" id="messageInput" placeholder="اكتب رسالة خاصة...">
            <button id="sendBtn">➤</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, limit, setDoc, updateDoc, where } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCMH9WZIHPYYtnAhCUjRWyq9alIHPX872E",
        authDomain: "kirafix-a0ed2.firebaseapp.com",
        projectId: "kirafix-a0ed2",
        storageBucket: "kirafix-a0ed2.firebasestorage.app",
        messagingSenderId: "1038377831293",
        appId: "1:103837103837:web:c4763c6157addb25a1da14"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    // كود تطبيق الإعدادات المحفوظة - ضعه في كل الصفحات
function applyGlobalSettings() {
    // 1. تطبيق وضع الظلام
    const savedDark = localStorage.getItem('kirafix-dark') === 'true';
    if (savedDark) {
        document.body.classList.add('dark-mode');
    } else {
        document.body.classList.remove('dark-mode');
    }

    // 2. تطبيق اللغة والاتجاه
    const savedLang = localStorage.getItem('kirafix-lang') || 'ar';
    document.body.dir = (savedLang === 'ar') ? 'rtl' : 'ltr';
    
    // هنا ممكن تستدعي الدالة اللي بتغير النصوص عندك في الصفحة بناءً على savedLang
    if (typeof applyMainLanguage === 'function') {
        applyMainLanguage(savedLang);
    }
}

// استدعاء الدالة فوراً
applyGlobalSettings();

    let currentUser = null;
    const urlParams = new URLSearchParams(window.location.search);
    const receiverId = urlParams.get('id');

function loadSideChats(myId) {
    const q = query(
        collection(db, "chats"),
        where("users", "array-contains", myId),
        orderBy("lastUpdate", "desc")
    );

    onSnapshot(q, async (snapshot) => {
        const sideList = document.getElementById("sideChatsList");
        sideList.innerHTML = "";

        for (const chatDoc of snapshot.docs) {
            const data = chatDoc.data();
            const otherUserId = data.users.find(id => id !== myId);
            
            if (!otherUserId) continue;

            const userDoc = await getDoc(doc(db, "users", otherUserId));
            const userData = userDoc.exists() ? userDoc.data() : { name: "مستخدم مجهول", image: "" };

            const isCurrent = otherUserId === receiverId;
            
            // التحقق: هل أنا المستلم والرسالة لسه مقرتهاش؟
            const isUnread = data.isRead === false && data.lastSenderId !== myId;

            const chatItem = document.createElement("a");
            chatItem.href = `chat.html?id=${otherUserId}`;
            
            // إضافة كلاس unread لو الرسالة جديدة
            chatItem.className = `side-chat-item ${isCurrent ? 'active' : ''} ${isUnread ? 'unread' : ''}`;
            
            chatItem.innerHTML = `
                <img src="${userData.image || 'af80e23deeb127837d30554452546196.jpg'}" class="side-chat-img">
                <div class="side-chat-details">
                    <span class="side-chat-name">${userData.name}</span>
                    <span class="side-chat-last ${isUnread ? 'unread-text' : ''}">${data.lastMessage || "بدء محادثة..."}</span>
                </div>
                ${isUnread ? '<div class="unread-badge"></div>' : ''}
            `;
            sideList.appendChild(chatItem);
        }
    });
}

    onAuthStateChanged(auth, (user) => {
        if (user && receiverId) { 
            currentUser = user; 
            
            // تحديث حالة "أحمد" الشخصية لـ أونلاين
            updateDoc(doc(db, "users", user.uid), {
                status: "online",
                lastSeen: serverTimestamp()
            });

            setupChat();
            loadSideChats(user.uid);
        } else if (!receiverId) {
            window.location.href = "Kirafix.html";
        } else {
            window.location.href = "Kirafix.html";
        }
    });

    async function setupChat() {
        // مراقبة حالة الطرف التاني (Real-time Status)
        onSnapshot(doc(db, "users", receiverId), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("receiverName").textContent = data.name;
                document.getElementById("receiverImg").src = data.image || "af80e23deeb127837d30554452546196.jpg";
                
                const statusLabel = document.getElementById("statusLabel");
                if (data.status === "online") {
                    statusLabel.textContent = "نشط الآن";
                    statusLabel.style.color = "green";
                } else {
                    statusLabel.textContent = "غير متصل";
                    statusLabel.style.color = "gray";
                }
            }
        });

        const chatId = currentUser.uid < receiverId 
            ? `${currentUser.uid}_${receiverId}` 
            : `${receiverId}_${currentUser.uid}`;

        loadMessages(chatId);

        document.getElementById("sendBtn").onclick = () => sendMessage(chatId);
        document.getElementById("messageInput").onkeypress = (e) => { if (e.key === "Enter") sendMessage(chatId); };
    }

    async function sendMessage(chatId) {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        
        if (!text || !auth.currentUser) return;
        input.value = ""; 

        try {
            const chatRef = doc(db, "chats", chatId);
await setDoc(chatRef, { 
    lastMessage: text, 
    lastUpdate: serverTimestamp(), 
    lastSenderId: currentUser.uid, 
    receiverId: receiverId, // مهم جداً عشان التنبيهات
    isRead: false, 
    users: [currentUser.uid, receiverId] 
}, { merge: true });

            await addDoc(collection(db, "chats", chatId, "messages"), {
                text: text,
                senderId: auth.currentUser.uid,
                createdAt: serverTimestamp()
            });
        } catch (error) {
            console.error("خطأ في الإرسال:", error);
        }
    }

async function loadMessages(chatId) {
    const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt", "desc"), limit(50));
    
    onSnapshot(q, async (snapshot) => {
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = "";

        snapshot.docs.reverse().forEach(docSnap => {
            const msg = docSnap.data();

            const dateObj = msg.createdAt ? msg.createdAt.toDate() : new Date();
            let hours = dateObj.getHours();
            let minutes = dateObj.getMinutes();
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12;
            hours = hours ? hours : 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            const timeStr = `${hours}:${minutes} ${ampm}`;

            const div = document.createElement("div");
            div.className = `msg-wrapper ${msg.senderId === currentUser.uid ? 'mine' : 'theirs'}`;
            div.innerHTML = `<div class="msg-bubble">${msg.text}<span class="msg-time">${timeStr}</span></div>`;
            chatBox.appendChild(div);
        });

        // 👇 ده كان سبب المشكلة
        const chatRef = doc(db, "chats", chatId);
        await updateDoc(chatRef, { isRead: true });

        chatBox.scrollTop = chatBox.scrollHeight;
        
    });
}
</script>
</body>
</html>
