<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رسائلي - Kirafix</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f0f2f5; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .inbox-container { max-width: 600px; margin: auto; background: white; border-radius: 15px; overflow: hidden; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .inbox-header { padding: 20px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .chat-item { 
            display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #f0f0f0; 
            cursor: pointer; transition: 0.3s; text-decoration: none; color: inherit;
        }
        .chat-item:hover { background: #f9fafb; }
        .user-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; background: #ddd; }
        .chat-info { flex: 1; margin-right: 15px; }
        .user-name { font-weight: 700; display: block; color: #1c1e21; }
        .last-msg { font-size: 13px; color: #65676b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; display: block; }
        .msg-time { font-size: 11px; color: #8a8d91; }
    </style>
</head>
<body>

    <div class="inbox-container">
        <div class="inbox-header">
            <a href="Kirafix.html" style="text-decoration:none;">⬅️</a>
            <h2 style="margin:0;">الدردشات</h2>
        </div>
        <div id="chatsList">
            <p style="text-align:center; padding:20px; color:#666;">جاري تحميل المحادثات...</p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCMH9WZIHPYYtnAhCUjRWyq9alIHPX872E",
        authDomain: "kirafix-a0ed2.firebaseapp.com",
        projectId: "kirafix-a0ed2",
        storageBucket: "kirafix-a0ed2.firebasestorage.app",
        messagingSenderId: "1038377831293",
        appId: "1:103837103837:web:c4763c6157addb25a1da14"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            loadMyChats(user.uid);
        } else {
            window.location.href = "login.html";
        }
    });

    function loadMyChats(myId) {
        // البحث عن كل الغرف اللي أنا عضو فيها (موجود في مصفوفة users)
        const q = query(
            collection(db, "chats"), 
            where("users", "array-contains", myId),
            orderBy("lastUpdate", "desc")
        );

        onSnapshot(q, async (snapshot) => {
            const listDiv = document.getElementById("chatsList");
            if (snapshot.empty) {
                listDiv.innerHTML = "<p style='text-align:center; padding:20px;'>لا توجد محادثات بعد.</p>";
                return;
            }

            listDiv.innerHTML = "";
            for (const chatDoc of snapshot.docs) {
                const chatData = chatDoc.data();
                // استخراج ID الشخص التاني
                const otherUserId = chatData.users.find(id => id !== myId);
                
                // جلب بيانات الشخص التاني (الاسم والصورة)
                const userDoc = await getDoc(doc(db, "users", otherUserId));
                const userData = userDoc.exists() ? userDoc.data() : { name: "مستخدم مجهول", image: "" };

                const time = chatData.lastUpdate ? chatData.lastUpdate.toDate().toLocaleDateString('ar-EG') : "";

                const item = document.createElement("a");
                item.href = `chat.html?id=${otherUserId}`;
                item.className = "chat-item";
                item.innerHTML = `
                    <img src="${userData.image || 'default-avatar.png'}" class="user-img">
                    <div class="chat-info">
                        <span class="user-name">${userData.name}</span>
                        <span class="last-msg">${chatData.lastMessage || "أرسل رسالة..." }</span>
                    </div>
                    <span class="msg-time">${time}</span>
                `;
                listDiv.appendChild(item);
            }
        });
    }
</script>
</body>
</html>
