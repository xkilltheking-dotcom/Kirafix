<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirafix Ai - المساعد الذكي</title>
    <link rel="stylesheet" href="ai.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="status-dot"></div>
            <h1>Kirafix Ai</h1>
        </div>
        
        <div id="chat-box" class="chat-box">
            <div class="message ai-msg">أهلاً بك! أنا Kirafix Ai، كيف يمكنني مساعدتك اليوم؟</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script src="script.js">
        async function sendMessage() {
    const input = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    const message = input.value.trim();

    if (message === "") return;

    // إضافة رسالة المستخدم للشاشة
    chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        // الربط مع سيرفر الـ Python (تأكد إنه شغال)
        const response = await fetch('http://127.0.0.1:8000/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: message })
        });

        const data = await response.json();
        
        // إضافة رد Kirafix Ai للشاشة
        chatBox.innerHTML += `<div class="message ai-msg">${data.answer}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        chatBox.innerHTML += `<div class="message ai-msg" style="color:red">عذراً، السيرفر مش شغال حالياً!</div>`;
    }
}

function handleKeyPress(e) {
    if (e.key === 'Enter') sendMessage();
}
    </script>
</body>
</html>
