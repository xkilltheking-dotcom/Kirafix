<script>
    // قاموس اللغات (تم إضافة نصوص الخروج)
    const translations = {
        ar: {
            title: "الإعدادات",
            back: "← العودة للرئيسية",
            labelLang: "لغة التطبيق",
            descLang: "اختر اللغة المفضلة لواجهة المستخدم",
            labelTheme: "المظهر (Dark Mode)",
            descTheme: "تبديل بين الوضع الفاتح والمظلم",
            labelNotif: "الإشعارات",
            descNotif: "تلقي تنبيهات عند التفاعل مع بوستاتك",
            btnDark: "تبديل الوضع",
            labelLogout: "تسجيل الخروج",
            descLogout: "الخروج من حسابك الحالي"
        },
        en: {
            title: "Settings",
            back: "← Back to Home",
            labelLang: "App Language",
            descLang: "Choose your preferred interface language",
            labelTheme: "Appearance (Dark Mode)",
            descTheme: "Switch between light and dark themes",
            labelNotif: "Notifications",
            descNotif: "Receive alerts for interactions",
            btnDark: "Toggle Theme",
            labelLogout: "Logout",
            descLogout: "Sign out of your account"
        },
        fr: {
            title: "Paramètres",
            back: "← Retour à l'accueil",
            labelLang: "Langue de l'application",
            descLang: "Choisissez votre langue d'interface",
            labelTheme: "Apparence (Mode Sombre)",
            descTheme: "Basculer entre les thèmes",
            labelNotif: "Notifications",
            descNotif: "Recevoir des alertes",
            btnDark: "Changer le mode",
            labelLogout: "Déconnexion",
            descLogout: "Se déconnecter"
        },
        es: {
            title: "Ajustes",
            back: "← Volver al inicio",
            labelLang: "Idioma de la aplicación",
            descLang: "Elige tu idioma preferido",
            labelTheme: "Apariencia (Modo Oscuro)",
            descTheme: "Cambiar entre temas",
            labelNotif: "Notificaciones",
            descNotif: "Recibir alertas",
            btnDark: "Cambiar modo",
            labelLogout: "Cerrar sesión",
            descLogout: "Cerrar sesión en su cuenta"
        },
        zh: {
            title: "设置",
            back: "← 回到首页",
            labelLang: "应用语言",
            descLang: "选择您的界面语言",
            labelTheme: "外观 (深色模式)",
            descTheme: "切换主题",
            labelNotif: "通知",
            descNotif: "接收提醒",
            btnDark: "切换模式",
            labelLogout: "登出",
            descLogout: "退出当前账号"
        }
    };

    const langSelect = document.getElementById('languageSelect');
    const darkBtn = document.getElementById('darkModeBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    // وظيفة تغيير اللغة
    function applyLanguage(lang) {
        const t = translations[lang];
        if(!t) return;

        document.getElementById('lang-title').textContent = t.title;
        document.getElementById('lang-back').textContent = t.back;
        document.getElementById('lang-label-language').textContent = t.labelLang;
        document.getElementById('lang-desc-language').textContent = t.descLang;
        document.getElementById('lang-label-theme').textContent = t.labelTheme;
        document.getElementById('lang-desc-theme').textContent = t.descTheme;
        document.getElementById('lang-label-notif').textContent = t.labelNotif;
        document.getElementById('lang-desc-notif').textContent = t.descNotif;
        
        // تحديث نصوص زرار الخروج لو موجود
        if(document.getElementById('lang-label-logout')) {
            document.getElementById('lang-label-logout').textContent = t.labelLogout;
            document.getElementById('lang-desc-logout').textContent = t.descLogout;
        }

        document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        localStorage.setItem('kirafix-lang', lang);
    }

    langSelect.onchange = (e) => applyLanguage(e.target.value);

    // وظيفة وضع الظلام
    darkBtn.onclick = () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('kirafix-dark', isDark);
    };

    // وظيفة تسجيل الخروج (بدون استيراد خارجي عشان ميعطلش السكريبت)
    logoutBtn.onclick = () => {
        const isAr = localStorage.getItem('kirafix-lang') === 'ar';
        const confirmMsg = isAr ? "هل أنت متأكد من تسجيل الخروج؟" : "Are you sure you want to logout?";
        
        if (confirm(confirmMsg)) {
            // هنا بننادي على logout اللي المفروض يكون متعرف في ملف firebase-config
            // أو ببساطة بنمسح الداتا ونحول الصفحة
            localStorage.removeItem('kirafix-dark'); // مثال
            window.location.href = "login.html"; 
        }
    };

    // تحميل الإعدادات المحفوظة عند فتح الصفحة
    window.onload = () => {
        const savedLang = localStorage.getItem('kirafix-lang') || 'ar';
        const savedDark = localStorage.getItem('kirafix-dark') === 'true';

        langSelect.value = savedLang;
        applyLanguage(savedLang);

        if (savedDark) document.body.classList.add('dark-mode');
    };
</script>
